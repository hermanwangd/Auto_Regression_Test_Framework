            actual_output_ref: actual/output.txt
      bindings:
        db_seed:
          provider_family: file_batch
          provider_type: file_fixture
          materialize_as: input_file
      fixtures: {}
      oracles: {}
      assertions: {}
      observations: {}
    evidence_responsibility: [execution_log]
    dependencies: []
