provider_contracts:
  providers:
    spring_boot_cli:
      provider_contract_kind: file_batch
      provider_type: shell
      contract_path: release_units[0].provider_contracts.providers.spring_boot_cli
      command: 'echo framework-sample-ok; echo framework-sample-warn >&2'
      working_directory: .
      timeout_seconds: 10
      success_exit_codes: [0]
      logs:
        stdout: logs/stdout.log
        stderr: logs/stderr.log
      outputs:
        actual_output_ref: actual/output.txt
  bindings:
    db_seed:
      provider_contract_kind: file_batch
      provider_type: file_fixture
      bind_as: input_file
      contract_path: release_units[0].provider_contracts.bindings.db_seed
      materialize_as: input_file
  fixtures: {}
  oracles: {}
  assertions: {}
  observations: {}
