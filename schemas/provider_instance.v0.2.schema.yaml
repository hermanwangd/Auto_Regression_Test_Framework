contract_version: v0.2
artifact: provider_instance
status: framework_owned_current_stage
purpose: >
  Defines one RP logical runtime target using a Provider Contract. The Provider
  Instance fills logical selections only; binding key schema belongs to the
  Provider Contract and actual environment-specific values belong to Env_Profile.
version_compatibility:
  supported_versions: [v0.2]
  unsupported_version_behavior: block_before_provider_dispatch
required_fields:
  - provider_instance_version
  - provider_id
  - provider_type
  - runtime_modes
shape_rules:
  provider_contract_shape: top_level_sections_must_be_allowed_by_referenced_provider_contract
  unknown_top_level_field: block_before_provider_dispatch
  unknown_nested_field: block_before_provider_dispatch
  operation_not_in_contract: block_before_provider_dispatch
  input_key_not_in_contract: block_before_provider_dispatch
  runtime_modes_not_subset_of_contract: block_before_provider_dispatch
  output_ref_not_in_contract: block_before_provider_dispatch
  evidence_output_not_in_contract: block_before_provider_dispatch
  failure_code_not_in_contract: block_before_provider_dispatch
allowed_sections:
  - provider_instance_version
  - provider_id
  - provider_type
  - profile
  - runtime_mode
  - runtime_modes
  - dialect
  - connection
  - defaults
  - readiness
  - operations
  - evidence
  - failure_mapping
  - safety
  - labels
binding_key_rules:
  provider_instance_must_not_define_binding_key_schema: true
  actual_values_must_be_supplied_by_env_profile: true
  raw_urls_topics_db_strings_namespaces_credentials: prohibited
runtime_mode_rules:
  provider_instance_runtime_modes_must_be_subset_of_contract: true
  local_ci_may_select_mock_stub_or_ephemeral_modes: true
  sit_preprod_mock_substitution_requires_explicit_profile_allowance: true
validation_output_fields:
  - ap
  - file_path
  - field_path
  - provider_id
  - provider_type
  - profile
  - operation
  - runtime_mode
  - severity
  - reason
  - owner_action
evidence_outputs:
  - provider_instance_validation_report
  - resolved_execution_plan
unsupported_behavior:
  missing_provider_instance: block_before_provider_dispatch
  missing_provider_contract: block_before_provider_dispatch
  missing_env_profile: block_before_provider_dispatch
  missing_required_binding_key: block_before_provider_dispatch
  unsupported_runtime_mode: block_before_provider_dispatch
failure_classification: target_resolution_error
