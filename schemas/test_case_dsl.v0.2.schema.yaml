contract_version: v0.2
artifact: test_case_dsl
status: framework_owned_current_stage
version_compatibility:
  supported_versions: [v0.2]
  legacy_read_versions: [v1]
  unsupported_version_behavior: block_before_execution
  legacy_promotion_behavior: legacy artifacts may be read only through explicit compatibility translation and must not be written as new v0.2 artifacts
required_sections:
  - dsl_version
  - test_case_id
  - status
  - revision
  - source_refs.acceptance_criteria
  - targets.<target>.provider_id
  - execute
  - verify
  - evidence.required
  - runtime.timeout
  - runtime.retry
conditional_sections:
  data_binding: allowed as an optional reviewed data source index when setup, execute, cleanup, or verify refs use shared data artifacts
  parameters: allowed as an optional reviewed data source index when one test has multiple parameter cases
  setup: required when precondition data or mutated state is needed
  cleanup: required when setup mutates state
  expected_results: required when verify uses reusable truth artifacts
data_binding_rules:
  allowed: true
  required_when_data_namespace_refs_are_used: true
  allowed_top_level_fields:
    - input_data
    - setup_data
    - cleanup_data
    - expect_data
  prohibited_top_level_fields:
    - datasets
    - fixtures
    - expected_results
    - db_seed
    - db_cleanup
    - mock_stubs
  prohibition_scope: data_binding category keys only; lifecycle sections such as setup.fixtures and provider operations such as db_seed or db_cleanup remain valid when defined by the Provider Contract
  ref_namespace_prefix: data
  reference_format: ${data.<category>.<name>}
  required_source_fields:
    - ref
  category_target_rules:
    input_data: execute operation input artifacts
    setup_data: setup operation data artifacts
    cleanup_data: cleanup operation data artifacts
    expect_data: verify operation expected result or oracle artifacts
  prohibited_values:
    - raw_secret
    - endpoint_url
    - jdbc_url
    - broker_url
target_rules:
  provider_id_required: true
  profile_required: false
  selected_profile_source: cli_or_suite_manifest
  endpoint_topic_db_credential_values: prohibited
operation_rules:
  setup_execute_cleanup_operations_must_exist_in_provider_contract: true
  output_refs_must_exist_in_provider_contract: true
parameter_rules:
  operation_parameters_use_ref_and_bind_as: true
  ref_required: true
  bind_as_required: true
  bind_as_must_be_allowed_by_referenced_provider_contract: true
  applies_to:
    - setup.fixtures.<fixture>.parameters[]
    - execute[].parameters[]
    - cleanup.fixtures.<fixture>.parameters[]
  reviewed_parameter_sets_are_referenced_by_ref: true
validation_output_fields:
  - ap
  - file_path
  - field_path
  - test_case_id
  - provider_id
  - provider_type
  - selected_profile
  - source_refs.acceptance_criteria
  - severity
  - blocking_scope
  - reason
  - owner_action
evidence_outputs:
  - validation_report
  - dry_run_report
prohibited_sections:
  - rp_id
  - ac_id
  - execution_target
  - package_inputs
  - oracles
  - steps
  - assertions
  - evidence_required
  - policy
  - approval_status
  - scenario
  - waiver
  - release_gate
  - risk_approval
unsupported_behavior:
  missing_required_section: block_before_execution
  unsupported_enum: block_before_execution
  prohibited_section: block_before_execution
  unresolved_reference: block_before_provider_dispatch
  missing_provider_instance: block_before_provider_dispatch
  missing_provider_contract: block_before_provider_dispatch
  invalid_bind_as: block_before_provider_dispatch
  missing_output_ref: block_before_provider_dispatch
  raw_secret: block_before_execution
failure_classification: schema_error
