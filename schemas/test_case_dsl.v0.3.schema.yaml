contract_version: v0.3
artifact: test_case_dsl
status: framework_owned_current_stage
required_sections:
  - dsl_version
  - test_case_id
  - title
  - execute
  - verify
phase_sections:
  setup: ordered_list_optional
  execute: ordered_list_required
  verify: ordered_list_required
  cleanup: ordered_list_optional
step_rules:
  id_pattern: "[a-z][a-z0-9_]*"
  target_source: suite_manifest.targets
  operation_field: op
  input_field: with
verify_rules:
  variants:
    - assertion
    - provider_check
  provider_check_prohibited_fields:
    - expect
prohibited_sections:
  - uses
  - targets
  - provider_id
  - provider_instance
  - data_binding
  - datasets
  - fixtures
  - expected_results
  - db_seed
  - db_cleanup
  - mock_stubs
  - parameters
  - bind_as
