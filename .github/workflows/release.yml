name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: Release version, for example 0.2.1
        required: true

permissions:
  contents: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build and Publish Release
    runs-on: ubuntu-latest
    timeout-minutes: 150
    env:
      MAVEN_OPTS: -Xmx1536m
      DEPENDENCY_CHECK_VERSION: 12.2.2
      DEPENDENCY_CHECK_DATA_DIR: .dependency-check-data
      NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve requested version
        id: version
        shell: bash
        run: |
          requested="${{ github.event.inputs.version }}"
          if [[ -z "$requested" ]]; then
            requested="${GITHUB_REF_NAME#v}"
          fi
          version="$(scripts/release/verify-release-version.sh "$requested")"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Resolve Dependency-Check cache key date
        id: dependency-check-cache-date
        shell: bash
        run: echo "date=$(/bin/date -u '+%Y%m%d')" >> "$GITHUB_OUTPUT"

      - name: Restore Dependency-Check data
        id: dependency-check-cache
        uses: actions/cache/restore@v4
        with:
          path: ${{ env.DEPENDENCY_CHECK_DATA_DIR }}
          key: ${{ runner.os }}-dependency-check-${{ env.DEPENDENCY_CHECK_VERSION }}-${{ steps.dependency-check-cache-date.outputs.date }}
          restore-keys: |
            ${{ runner.os }}-dependency-check-${{ env.DEPENDENCY_CHECK_VERSION }}-
            ${{ runner.os }}-dependency-check-

      - name: Check restored Dependency-Check data
        id: dependency-check-data
        shell: bash
        run: |
          if [[ -d "${DEPENDENCY_CHECK_DATA_DIR}" ]] && find "${DEPENDENCY_CHECK_DATA_DIR}" -type f -print -quit | grep -q .; then
            echo "available=true" >> "$GITHUB_OUTPUT"
            echo "dependency_check_cache_status: restored"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "dependency_check_cache_status: missing"
          fi

      - name: Unit, integration, and packaged CLI verification
        run: ./mvnw -B -ntp verify

      - name: Critical delivery coverage gate
        run: ./mvnw -B -ntp -Pv02-delivery-coverage -DskipTests jacoco:check@v02-delivery-critical-class-check

      - name: Contract and evidence consistency
        run: scripts/ci/verify-contracts.sh

      - name: Public provider support contract
        run: scripts/ci/check-public-support-contract.sh

      - name: Secret scan
        run: scripts/ci/secret-scan.sh

      - name: Require warmed Dependency-Check cache
        if: steps.dependency-check-data.outputs.available != 'true'
        shell: bash
        run: |
          echo "::error title=Dependency-Check cache unavailable::Release jobs do not download NVD data. Run the Dependency-Check Cache workflow on the default branch first, then rerun this release."
          exit 1

      - name: Dependency vulnerability scan
        env:
          DEPENDENCY_CHECK_AUTO_UPDATE: false
        run: scripts/ci/security-scan.sh

      - name: Upload dependency scan reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: release-dependency-security-${{ github.run_id }}
          path: |
            target/dependency-check-report.*
          if-no-files-found: ignore

      - name: Generate SBOM
        run: scripts/ci/generate-sbom.sh

      - name: Build immutable release jar
        run: ./mvnw -B -ntp -DskipTests package

      - name: Build usage kit
        run: scripts/release/build-usage-kit.sh "${{ steps.version.outputs.version }}"

      - name: Verify usage kit
        run: scripts/release/verify-usage-kit.sh "target/spec-driven-auto-regression-${{ steps.version.outputs.version }}-usage-kit.zip" "${{ steps.version.outputs.version }}"

      - name: Verify supported provider samples
        env:
          REQUIRE_EXTERNAL_MESSAGING: ${{ vars.REQUIRE_EXTERNAL_MESSAGING || 'false' }}
          KAFKA_BOOTSTRAP_SERVERS: ${{ secrets.KAFKA_BOOTSTRAP_SERVERS }}
          IBM_MQ_CONN_NAME: ${{ secrets.IBM_MQ_CONN_NAME }}
          IBM_MQ_CREDENTIAL: ${{ secrets.IBM_MQ_CREDENTIAL }}
        run: scripts/release/verify-supported-provider-samples.sh "${{ steps.version.outputs.version }}"

      - name: Generate checksums
        run: scripts/release/write-checksums.sh "${{ steps.version.outputs.version }}"

      - name: Extract release notes
        run: scripts/release/extract-release-notes.sh "${{ steps.version.outputs.version }}"

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign release artifacts
        shell: bash
        run: |
          version="${{ steps.version.outputs.version }}"
          for artifact in \
            "target/spec-driven-auto-regression-${version}.jar" \
            "target/spec-driven-auto-regression-${version}-usage-kit.zip" \
            target/bom.json \
            target/bom.xml \
            target/checksums.sha256
          do
            cosign sign-blob --yes "$artifact" \
              --output-signature "${artifact}.sig" \
              --output-certificate "${artifact}.pem"
          done

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Auto Regression Test Framework ${{ steps.version.outputs.version }}
          body_path: target/release-notes.md
          generate_release_notes: false
          files: |
            target/spec-driven-auto-regression-${{ steps.version.outputs.version }}.jar
            target/spec-driven-auto-regression-${{ steps.version.outputs.version }}.jar.sig
            target/spec-driven-auto-regression-${{ steps.version.outputs.version }}.jar.pem
            target/spec-driven-auto-regression-${{ steps.version.outputs.version }}-usage-kit.zip
            target/spec-driven-auto-regression-${{ steps.version.outputs.version }}-usage-kit.zip.sig
            target/spec-driven-auto-regression-${{ steps.version.outputs.version }}-usage-kit.zip.pem
            target/bom.json
            target/bom.json.sig
            target/bom.json.pem
            target/bom.xml
            target/bom.xml.sig
            target/bom.xml.pem
            target/checksums.sha256
            target/checksums.sha256.sig
            target/checksums.sha256.pem
            target/dependency-check-report.html
            target/dependency-check-report.json
