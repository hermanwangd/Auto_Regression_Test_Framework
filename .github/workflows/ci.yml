name: CI

on:
  pull_request:
    branches:
      - main
      - 'release/**'
  push:
    branches:
      - main
      - 'release/**'
      - 'codex/release-*'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  framework-gates:
    name: Framework Gates
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      MAVEN_OPTS: -Xmx1536m
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Unit, integration, and packaged CLI verification
        run: scripts/ci/maven-verify-with-diagnostics.sh

      - name: Critical delivery coverage gate
        run: ./mvnw -B -ntp -Pv02-delivery-coverage -DskipTests jacoco:check@v02-delivery-critical-class-check

      - name: Contract and evidence consistency
        run: scripts/ci/verify-contracts.sh

      - name: Public provider support contract
        run: scripts/ci/check-public-support-contract.sh

      - name: Secret scan
        run: scripts/ci/secret-scan.sh

      - name: Generate SBOM
        run: scripts/ci/generate-sbom.sh

      - name: Upload verification artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: framework-verification-${{ github.run_id }}
          path: |
            target/surefire-reports/
            target/failsafe-reports/
            target/site/jacoco/
            target/bom.json
            target/bom.xml
          if-no-files-found: ignore

  dependency-security:
    name: Dependency Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      MAVEN_OPTS: -Xmx1536m
      DEPENDENCY_CHECK_VERSION: 12.2.2
      DEPENDENCY_CHECK_DATA_DIR: .dependency-check-data
      NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Resolve Dependency-Check cache key date
        id: dependency-check-cache-date
        shell: bash
        run: echo "date=$(/bin/date -u '+%Y%m%d')" >> "$GITHUB_OUTPUT"

      - name: Restore Dependency-Check data
        id: dependency-check-cache
        uses: actions/cache/restore@v4
        with:
          path: ${{ env.DEPENDENCY_CHECK_DATA_DIR }}
          key: ${{ runner.os }}-dependency-check-${{ env.DEPENDENCY_CHECK_VERSION }}-${{ steps.dependency-check-cache-date.outputs.date }}
          restore-keys: |
            ${{ runner.os }}-dependency-check-${{ env.DEPENDENCY_CHECK_VERSION }}-
            ${{ runner.os }}-dependency-check-

      - name: Warm Dependency-Check data
        if: steps.dependency-check-cache.outputs.cache-hit != 'true'
        timeout-minutes: 80
        run: scripts/ci/security-scan.sh --warmup

      - name: Save warmed Dependency-Check data
        uses: actions/cache/save@v4
        if: steps.dependency-check-cache.outputs.cache-hit != 'true'
        with:
          path: ${{ env.DEPENDENCY_CHECK_DATA_DIR }}
          key: ${{ runner.os }}-dependency-check-${{ env.DEPENDENCY_CHECK_VERSION }}-${{ steps.dependency-check-cache-date.outputs.date }}

      - name: OWASP dependency vulnerability scan
        env:
          DEPENDENCY_CHECK_AUTO_UPDATE: false
        run: scripts/ci/security-scan.sh

      - name: Upload dependency scan reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dependency-security-${{ github.run_id }}
          path: |
            target/dependency-check-report.*
          if-no-files-found: ignore
