dsl_version: v0.2
test_case_id: GOLDEN-E2E-TC-001
title: Framework Golden E2E sample
status: active
revision: 1
source_refs:
  framework_requirement: docs/03-acceptance/04_acceptance_criteria.md#track-b-golden-e2e
labels:
  evidence_classification: framework_verification_only
  sample_id: GOLDEN-E2E
  tags: [golden-e2e, framework-sample]
compatible_profiles: [local_golden]
targets:
  sample_runtime:
    provider_id: sample-fake-runtime
data:
  input:
    ref: fixtures/input.json
  setup_fixture:
    ref: fixtures/setup_fixture.yaml
  cleanup_fixture:
    ref: fixtures/cleanup_fixture.yaml
  expected_output:
    ref: expected_results/expected_output.json
setup:
  operations:
    - id: prepare_sample_workspace
      target: sample_runtime
      operation: setup_fixture
      inputs:
        fixture.setup_ref:
          ref: ${data.setup_fixture}
        fixture.input_ref:
          ref: ${data.input}
execute:
  operations:
    - id: produce_sample_output
      target: sample_runtime
      operation: execute_sample
      inputs:
        sample.input_ref:
          ref: ${data.input}
        sample.expected_ref:
          ref: ${data.expected_output}
      outputs:
        actual_json: actual_json
        actual_text: actual_text
        execution_log: execution_log
verify:
  checks:
    - id: status_is_ok
      type: value_equals
      actual:
        ref: ${execute.produce_sample_output.outputs.actual_json}
      selector: $.status
      expected: OK
    - id: output_matches_expected_json
      type: json_match
      actual:
        ref: ${execute.produce_sample_output.outputs.actual_json}
      expected_ref: expected_results/expected_output.json
      options:
        ignore_order: true
        ignore_paths:
          - $.generatedAt
cleanup:
  operations:
    - id: cleanup_sample_workspace
      target: sample_runtime
      operation: cleanup_fixture
      inputs:
        fixture.cleanup_ref:
          ref: ${data.cleanup_fixture}
evidence:
  required:
    - evidence_index.yaml
    - logs/execution.log
    - fixture/setup.yaml
    - fixture/cleanup.yaml
    - actual/actual_output.json
    - expected/expected_output.ref
    - assertions/status_is_ok.yaml
    - assertions/output_matches_expected_json.yaml
    - diffs/output_matches_expected_json.diff
    - batch/batch.yaml
runtime:
  timeout: PT30S
  retry:
    max_attempts: 1
