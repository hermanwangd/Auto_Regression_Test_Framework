environment_id: local-provider-jdbc
profile: local_provider
provider_bindings:
  - provider_id: oracle-like-db
    runtime_mode: ephemeral
    binding_values:
      jdbc_url: fixture-jdbc://oracle-like
      username: fixture_user
      password:
        secret_ref: generated://provider-capability/oracle-like/password
      dialect: oracle
  - provider_id: db2-like-db
    runtime_mode: ephemeral
    binding_values:
      jdbc_url: fixture-jdbc://db2-like
      username: fixture_user
      password:
        secret_ref: generated://provider-capability/db2-like/password
      dialect: db2
evidence_policy:
  evidence_classification: framework_provider_capability_only
  downstream_release_evidence: false
