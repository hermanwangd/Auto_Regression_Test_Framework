provider_instance_version: v0.2
provider_id: oracle-like-db
provider_type: jdbc
profile: local_jdbc
runtime_modes: [native, ephemeral]
dialect: oracle
connection:
  secret_ref: ${environment.connection.secret_ref}
binding_keys:
  connection.secret_ref:
    required: true
  dialect:
    required: true
  schema:
    required: false
  query_timeout:
    required: false
  masking_policy:
    required: false
  strict_params:
    required: false
defaults:
  query_timeout: PT10S
  strict_params: true
operations:
  db_seed:
    outputs: [affected_rows, duration_ms, seed_evidence_ref]
  db_query:
    outputs: [row_count, sample_rows, duration_ms, query_evidence_ref]
  db_record_exists:
    outputs: [matched, row_count, duration_ms, query_evidence_ref]
  db_cleanup:
    outputs: [affected_rows, duration_ms, cleanup_evidence_ref]
evidence:
  capture: [query_ref, sql_ref, dialect, masked_params, row_count, duration_ms, masked_sample_result, affected_rows, status]
  redact: [connection, password, secret, token]
failure_mapping:
  record_not_found: ASSERTION_FAILED
  cleanup_failed: CLEANUP_FAILED
labels:
  dialect_family: oracle
