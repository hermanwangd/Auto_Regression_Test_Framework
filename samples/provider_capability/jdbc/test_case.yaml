dsl_version: v0.2
test_case_id: JDBC-CAPABILITY-TC-001
title: JDBC Oracle and DB2 style provider capability
status: active
revision: 1
source_refs:
  acceptance_criteria: docs/03-acceptance/04_acceptance_criteria.md#track-c-jdbc
labels:
  capability: jdbc
  evidence_classification: framework_provider_capability_only
compatible_profiles: [local_jdbc]
targets:
  oracle_like_db:
    provider_id: oracle-like-db
    profile: local_jdbc
  db2_like_db:
    provider_id: db2-like-db
    profile: local_jdbc
scenario:
  type: provider_capability
  scope: framework_verification
  description: Seed, query, verify record existence, and cleanup with SQL params binding and masked JDBC evidence.
  capabilities: [db_seed, db_query, db_record_exists, db_cleanup]
data_binding:
  db_seed:
    order:
      ref: fixtures/db_seed.sql
  db_cleanup:
    order:
      ref: fixtures/db_cleanup.sql
expected_results:
  db_expected:
    ref: expected_results/db_expected.json
setup:
  fixtures:
    seed_order:
      type: db_seed
      target: oracle_like_db
      operation: db_seed
      parameters:
        - name: seed_sql
          ref: ${data.db_seed.order}
          bind_as: sql_ref
        - name: seed_order_id
          ref: expected_results/db_expected.json#/order_id
          bind_as: params.order_id
      cleanup_ref: ${data.db_cleanup.order}
execute:
  - id: query_order_oracle
    target: oracle_like_db
    operation: db_query
    parameters:
      - name: query
        ref: queries/order_exists_oracle.sql
        bind_as: query_ref
      - name: query_order_id
        ref: expected_results/db_expected.json#/order_id
        bind_as: params.order_id
    outputs:
      row_count: row_count
      sample_rows: sample_rows
      duration_ms: duration_ms
      query_evidence_ref: query_evidence_ref
verify:
  - id: order_record_exists
    type: db_record_exists
    target: oracle_like_db
    query:
      ref: queries/order_exists_oracle.sql
    expected_ref: expected_results/db_expected.json
    options:
      timeout: PT20S
      poll_interval: PT2S
cleanup:
  fixtures:
    cleanup_order:
      type: db_cleanup
      target: oracle_like_db
      operation: db_cleanup
      parameters:
        - name: cleanup_sql
          ref: ${data.db_cleanup.order}
          bind_as: sql_ref
        - name: cleanup_order_id
          ref: expected_results/db_expected.json#/order_id
          bind_as: params.order_id
evidence:
  required:
    - provider-evidence/jdbc/query_query_order_oracle.yaml
    - provider-evidence/jdbc/seed_seed_order.yaml
    - provider-evidence/jdbc/cleanup_cleanup_order.yaml
runtime:
  timeout: PT1M
  retry:
    max_attempts: 1
