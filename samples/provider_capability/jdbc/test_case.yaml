dsl_version: v0.2
test_case_id: JDBC-CAPABILITY-TC-001
title: JDBC Oracle and DB2 style provider capability
status: active
revision: 1
source_refs:
  acceptance_criteria: docs/03-acceptance/04_acceptance_criteria.md#track-c-jdbc
labels:
  capability: jdbc
  evidence_classification: framework_provider_capability_only
compatible_profiles: [local_jdbc]
targets:
  oracle_like_db:
    provider_id: oracle-like-db
  db2_like_db:
    provider_id: db2-like-db
data:
  order_seed:
    ref: fixtures/db_seed.sql
  order_cleanup:
    ref: fixtures/db_cleanup.sql
  db_expected:
    ref: expected_results/db_expected.json
setup:
  operations:
    - id: seed_order
      target: oracle_like_db
      operation: db_seed
      inputs:
        sql_ref:
          ref: ${data.order_seed}
        params.order_id:
          ref: expected_results/db_expected.json#/order_id
execute:
  operations:
    - id: query_order_oracle
      target: oracle_like_db
      operation: db_query
      inputs:
        query_ref:
          ref: queries/order_exists_oracle.sql
        params.order_id:
          ref: expected_results/db_expected.json#/order_id
      outputs:
        row_count: row_count
        sample_rows: sample_rows
        duration_ms: duration_ms
        query_evidence_ref: query_evidence_ref
verify:
  checks:
    - id: order_record_exists
      type: db_record_exists
      target: oracle_like_db
      query:
        ref: queries/order_exists_oracle.sql
      expected_ref: expected_results/db_expected.json
      options:
        timeout: PT20S
        poll_interval: PT2S
cleanup:
  operations:
    - id: cleanup_order
      target: oracle_like_db
      operation: db_cleanup
      inputs:
        sql_ref:
          ref: ${data.order_cleanup}
        params.order_id:
          ref: expected_results/db_expected.json#/order_id
evidence:
  required:
    - provider-evidence/jdbc/query_query_order_oracle.yaml
    - provider-evidence/jdbc/seed_seed_order.yaml
    - provider-evidence/jdbc/cleanup_cleanup_order.yaml
runtime:
  timeout: PT1M
  retry:
    max_attempts: 1
