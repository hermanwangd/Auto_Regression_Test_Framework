provider_contract_version: v0.2
provider_type: common_verify
runtime_modes: [local]
binding_keys:
  workspace_ref:
    required: true
    source: environment_binding
operations:
  event_published:
    allowed_bind_as: [expected_ref, actual_ref, timeout, poll_interval, consume_from]
    required_parameters: [expected_ref, actual_ref]
    output_refs: [polling_evidence_ref, last_observed_ref]
  db_record_exists:
    allowed_bind_as: [expected_ref, actual_ref, timeout, poll_interval]
    required_parameters: [expected_ref, actual_ref]
    output_refs: [polling_evidence_ref, last_observed_ref]
evidence:
  outputs: [polling_result, evidence_index, result_json]
  redact: [last_observed_value]
failure_mapping:
  allowed_codes:
    - INVALID_POLLING_CONFIG
    - POLLING_TIMEOUT
    - EXPECTED_ARTIFACT_MISSING
    - ACTUAL_ARTIFACT_MISSING
    - ASSERTION_MISMATCH
