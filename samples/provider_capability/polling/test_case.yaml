    type: event_published
    target: verifier
    expected_ref: expected_results/expected_timeout_result.json
    actual_ref: actual_samples/observed_event.json
    options:
      timeout: PT1S
      poll_interval: PT0S
      consume_from: test_start_time
    parameters:
      - name: expected
        ref: expected_results/expected_timeout_result.json
        bind_as: expected_ref
      - name: actual
        ref: actual_samples/observed_event.json
        bind_as: actual_ref
      - name: timeout
        ref: PT1S
        bind_as: timeout
      - name: poll_interval
        ref: PT0S
        bind_as: poll_interval
      - name: consume_from
        ref: test_start_time
        bind_as: consume_from
evidence:
  required:
    - polling/event_is_published.yaml
runtime:
  timeout: PT1M
  retry:
    max_attempts: 0
