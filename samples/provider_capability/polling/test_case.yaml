dsl_version: v0.2
test_case_id: POLLING-CAPABILITY-TC-001
title: Shared polling observes an eventually consistent event
status: active
revision: 1
source_refs:
  acceptance_criteria: docs/03-acceptance/polling.md#AC-POLLING-001
labels:
  feature_id: PR-006
  tags: [polling, p0]
compatible_profiles: [local_polling]
targets:
  verifier:
    provider_id: local-common-polling
    profile: local_polling
scenario:
