provider_instance_version: v0.2
provider_id: polling-observer
provider_type: polling_observer
runtime_modes: [stub]
binding_keys: {}
defaults:
  timeout_seconds: 30
operations:
  observe_condition:
    outputs: [last_observed, attempts]
evidence:
  capture: [last_observed, attempts, timeout_status]
failure_mapping:
  timeout: PROVIDER_TIMEOUT
  condition_not_met: ASSERTION_FAILED
labels:
  evidence_classification: framework_provider_capability_only
