provider_contract_version: v0.2
provider_type: wiremock_http_mock
purpose: Framework-owned WireMock HTTP mock provider for local and CI isolated dependency testing.
runtime_modes: [mock]
binding_keys:
  port_strategy:
    required: true
    source: environment_binding
  base_url_output_ref:
    required: true
    source: generated_binding_output
defaults:
  timeout_seconds: 30
  reset_before_load: true
valid_provider_instance_shape:
  required_fields: [provider_id, provider_type, runtime_modes, binding_keys]
  allowed_fields: [provider_id, provider_type, runtime_modes, binding_keys, defaults, readiness, operations, evidence, failure_mapping, labels]
  binding_keys: [port_strategy, base_url_output_ref]
operations:
  load_stubs:
    allowed_bind_as: [mock.mappings_ref, mock.reset_before_load]
    required_parameters: [mock.mappings_ref]
    output_refs: [base_url, loaded_stub_count, injected_stub, server_log]
  send_http_request:
    allowed_bind_as: [http.method, http.path, http.request_body, http.headers.*, mock.request_filter]
    required_parameters: [http.request_body, mock.request_filter]
    output_refs: [base_url, http_status, response_body, matched_count, request_journal, server_log]
  reset_mock:
    allowed_bind_as: []
    required_parameters: []
    output_refs: [cleanup_log, server_log]
evidence:
  outputs: [base_url, request_journal, server_log, injected_stub, assertion_result, failure_detail]
  redact: []
failure_mapping:
  allowed_codes: [PROVIDER_UNAVAILABLE, PROVIDER_STUB_MISSING, OPERATION_FAILED, ASSERTION_FAILED, EVIDENCE_INVALID, SECRET_RESOLUTION_ERROR]
