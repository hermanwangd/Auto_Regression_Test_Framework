provider_contract_version: v0.2
provider_type: wiremock_http_mock
runtime_modes: [mock]
binding_keys:
  mappings_ref:
    required: true
    source: environment_binding
  base_url_output_ref:
    required: false
    source: generated_binding_output
defaults:
  timeout_seconds: 60
  retry: 0
valid_provider_instance_shape:
  required_fields: [provider_id, provider_type, runtime_modes]
  allowed_fields: [provider_id, provider_type, runtime_modes, defaults, readiness, operations, evidence, failure_mapping, labels]
operations:
  start_mock:
    allowed_inputs: [mock.port, mock.mappings_ref, mock.files_ref]
    required_inputs: []
    output_refs: [base_url, server_log]
  load_stubs:
    allowed_inputs: [mock.mappings_ref, mock.reset_before_load]
    required_inputs: [mock.mappings_ref]
    output_refs: [loaded_stub_count, server_log, base_url]
  verify_requests:
    allowed_inputs: [mock.request_filter, mock.expected_count, mock.body_pattern]
    required_inputs: [mock.request_filter]
    output_refs: [request_journal, matched_count, server_log]
evidence:
  outputs: [base_url, request_journal, server_log, timing, error]
  redact: []
failure_mapping:
  allowed_codes: [PROVIDER_UNAVAILABLE, PROVIDER_TIMEOUT, OPERATION_FAILED, ASSERTION_FAILED, EVIDENCE_INVALID, SECRET_RESOLUTION_ERROR]
