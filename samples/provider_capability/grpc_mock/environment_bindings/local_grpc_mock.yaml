environment_id: local-grpc-mock
profile: local_grpc_mock
provider_bindings:
  - provider_id: customer-grpc-mock
    provider_instance_ref: provider_instances/customer_grpc_mock.yaml
    runtime_mode: mock
    binding_values:
      port_strategy: dynamic
      descriptor_ref: proto/customer.desc.b64
      service_name: com.example.customer.CustomerService
  - provider_id: customer-grpc-client
    provider_instance_ref: provider_instances/customer_grpc_client.yaml
    runtime_mode: native
    binding_values:
      target: generated://customer-grpc-mock.target_uri
evidence_policy:
  evidence_classification: framework_provider_capability_only
  downstream_release_evidence: false
