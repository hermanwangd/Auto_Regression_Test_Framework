provider_contract_version: v0.2
provider_type: nats
purpose: Framework-owned P0 NATS provider for event publish and verification.
runtime_modes: [local, ci, sit, preprod]
binding_keys:
  connection:
    required: true
    source: environment_binding_secret_ref_or_approved_local_ref
  subject:
    required: true
    source: environment_binding
  timeout:
    required: false
    source: environment_binding
  poll_interval:
    required: false
    source: environment_binding
  masking_policy:
    required: false
    source: environment_binding
  correlation_key:
    required: false
    source: environment_binding
defaults:
  timeout: PT5S
  poll_interval: PT0.05S
  consume_from: test_start_time
  masking_policy:
    redact: [connection, password, secret, token, authorization]
valid_provider_instance_shape:
  required_fields: [provider_id, provider_type, profile, runtime_modes, connection, subject, binding_keys]
  allowed_fields: [provider_instance_version, provider_id, provider_type, profile, runtime_mode, runtime_modes, connection, subject, timeout, poll_interval, masking_policy, correlation_key, binding_keys, defaults, operations, evidence, failure_mapping, labels]
  binding_keys: [connection, subject, timeout, poll_interval, masking_policy, correlation_key]
supported_verifiers: [event_published, event_payload_match]
operations:
  nats_publish:
    allowed_inputs: [subject, payload_ref, payload, correlation_key]
    required_inputs: [subject, payload_ref]
    output_refs: [subject, published, published_at, event_evidence_ref]
  nats_observe:
    allowed_inputs: [subject, consume_from, timeout, poll_interval, expected_ref, correlation_key]
    required_inputs: [subject]
    output_refs: [subject, observed_count, matched, duration_ms, event_evidence_ref]
  event_published:
    allowed_inputs: [subject, consume_from, timeout, poll_interval, correlation_key]
    required_inputs: [subject]
    output_refs: [subject, observed_count, matched, duration_ms, event_evidence_ref]
  event_payload_match:
    allowed_inputs: [subject, expected_ref, consume_from, timeout, poll_interval, correlation_key]
    required_inputs: [subject, expected_ref]
    output_refs: [subject, observed_count, matched, matched_fields, duration_ms, event_evidence_ref]
evidence:
  outputs: [event_evidence, assertion_evidence]
  event_evidence: [provider_type, provider_id, subject, consume_from, observation_window, timeout, poll_interval, attempts, observed_count, matched, matched_fields, masked_observed_payload, last_observed_payload, duration_ms, status, failure_code]
  redact: [connection, password, secret, token, authorization]
failure_mapping:
  allowed_codes:
    - SUBJECT_MISSING
    - PAYLOAD_REF_MISSING
    - PAYLOAD_PARAM_MISSING
    - NATS_CONNECTION_FAILED
    - NATS_PUBLISH_FAILED
    - NATS_OBSERVE_FAILED
    - EVENT_NOT_FOUND
    - PAYLOAD_MISMATCH
    - NATS_TIMEOUT
    - INVALID_DURATION
    - INVALID_INSTANT
    - REF_OUTSIDE_SUITE_ROOT
