dsl_version: v0.2
test_case_id: NATS-CAPABILITY-TC-001
title: NATS event provider capability
status: active
revision: 1
source_refs:
  acceptance_criteria: docs/03-acceptance/04_acceptance_criteria.md#track-c-nats
labels:
  capability: nats
  evidence_classification: framework_provider_capability_only
compatible_profiles: [local_nats]
targets:
  event_bus:
    provider_id: local-nats-event-bus
data_binding:
  input_data:
    event_input:
      ref: fixtures/event_input.json
  expect_data:
    event_expected:
      ref: expected_results/event_expected.json
expected_results:
  event_expected:
    ref: expected_results/event_expected.json
execute:
  - id: publish_event
    target: event_bus
    operation: nats_publish
    parameters:
      - name: subject
        ref: expected_results/event_expected.json#/subject
        bind_as: subject
      - name: payload
        ref: ${data.input_data.event_input}
        bind_as: payload_ref
    outputs:
      subject: subject
      published: published
      published_at: published_at
      event_evidence_ref: event_evidence_ref
verify:
  - id: event_published
    type: event_published
    target: event_bus
    parameters:
      - name: subject
        ref: expected_results/event_expected.json#/subject
        bind_as: subject
      - name: consume_from
        ref: test_start_time
        bind_as: consume_from
      - name: timeout
        ref: PT5S
        bind_as: timeout
      - name: poll_interval
        ref: PT0.05S
        bind_as: poll_interval
    options:
      timeout: PT5S
      poll_interval: PT0.05S
  - id: event_payload_match
    type: event_payload_match
    target: event_bus
    parameters:
      - name: subject
        ref: expected_results/event_expected.json#/subject
        bind_as: subject
      - name: expected
        ref: expected_results/event_expected.json#/payload
        bind_as: expected_ref
      - name: consume_from
        ref: test_start_time
        bind_as: consume_from
      - name: timeout
        ref: PT5S
        bind_as: timeout
      - name: poll_interval
        ref: PT0.05S
        bind_as: poll_interval
    options:
      timeout: PT5S
      poll_interval: PT0.05S
evidence:
  required:
    - event-evidence/nats/observed_event.yaml
    - assertions/event_published.yaml
    - assertions/event_payload_match.yaml
runtime:
  timeout: PT1M
  retry:
    max_attempts: 1
