provider_instance_version: v0.2
provider_id: order-events
provider_type: kafka
runtime_modes: [mock]
defaults:
  timeout: PT5S
  poll_interval: PT0.05S
  consume_from: test_start_time
operations:
  kafka_publish:
    outputs: [topic, partition, offset, key, published_at, event_evidence_ref]
  kafka_observe:
    outputs: [topic, observed_count, last_observed_offset, matched, duration_ms, event_evidence_ref]
  kafka_payload_match:
    outputs: [topic, observed_count, matched, matched_fields, duration_ms, event_evidence_ref, assertion_evidence_ref]
evidence:
  capture: [topic, partition, offset, key, observation_window, attempts, observed_count, matched, matched_fields, masked_observed_payload, duration_ms, status, failure_code]
  redact: [bootstrap_servers, security_config, password, secret, token, authorization, sasl, ssl]
failure_mapping:
  event_not_found: ASSERTION_FAILED
  payload_mismatch: ASSERTION_FAILED
  timeout: KAFKA_TIMEOUT
labels:
  evidence_classification: framework_provider_capability_only
