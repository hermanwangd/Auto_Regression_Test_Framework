dsl_version: v0.2
test_case_id: PROVIDER-CAPABILITY-COMPARE-TC-001
title: JSON schema and file diff verification capability
status: active
revision: 1
source_refs:
  acceptance_criteria: docs/03-acceptance/04_acceptance_criteria.md#track-c-compare
labels:
  capability: compare
  evidence_classification: framework_provider_capability_only
compatible_profiles: [local_provider]
targets:
  compare_engine:
    provider_id: compare-engine
    profile: local_provider
scenario:
  type: verify_capability
  scope: framework_verification
  description: Verify json_match, schema_match, file_diff, ignore_paths, normalize, and ignore_order.
  capabilities: [json_match, schema_match, file_diff]
expected_results:
  expected_payload:
    ref: expected_results/expected_payload.json
  expected_schema:
    ref: expected_results/expected_schema.json
  expected_file:
    ref: expected_results/expected_file.json
execute:
  - id: load_actual_samples
    target: compare_engine
    operation: read_artifact
    parameters:
      - name: actual_payload
        ref: actual_samples/actual_payload.json
        bind_as: file.path
      - name: actual_file
        ref: actual_samples/actual_file.json
        bind_as: file.path
    outputs:
      actual_payload: actual_payload
      actual_file: actual_file
verify:
  - id: payload_json_matches
    type: json_match
    actual:
      ref: actual_samples/actual_payload.json
    expected_ref: expected_results/expected_payload.json
    options:
      ignore_paths: [$.generatedAt]
      ignore_order: true
      normalize: true
  - id: payload_schema_matches
    type: schema_match
    actual:
      ref: actual_samples/actual_payload.json
    schema_ref: expected_results/expected_schema.json
  - id: file_diff_matches
    type: file_diff
    actual:
      ref: actual_samples/actual_file.json
    expected_ref: expected_results/expected_file.json
    options:
      normalize: true
      ignore_order: true
evidence:
  required:
    - assertion-results/payload_json_matches.yaml
    - assertion-results/payload_schema_matches.yaml
    - assertion-results/file_diff_matches.yaml
    - diffs/file_diff_matches.diff
runtime:
  timeout: PT30S
  retry:
    max_attempts: 1
