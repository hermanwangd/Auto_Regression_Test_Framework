environment_id: sit-contract-sample
profile: sit
provider_bindings:
  - provider_id: wiremock-payment-api
    runtime_mode: mock
    readiness_ref: evidence/readiness/wiremock-payment-api-sit.yaml
    binding_values:
      mappings_ref: fixtures/wiremock/payment-api/
  - provider_id: oracle-database
    runtime_mode: native
    readiness_ref: evidence/readiness/oracle-database-sit.yaml
    binding_values:
      connection:
        secret_ref: vault://sit/payment/db-connection
      dialect: oracle
  - provider_id: nats-event-bus
    runtime_mode: native
    readiness_ref: evidence/readiness/nats-event-bus-sit.yaml
    binding_values:
      connection:
        secret_ref: vault://sit/payment/nats-connection
      subject: payments.accepted
      timeout: PT30S
      poll_interval: PT0.5S
