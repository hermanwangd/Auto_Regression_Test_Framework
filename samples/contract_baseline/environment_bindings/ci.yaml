environment_id: ci-contract-sample
profile: ci
provider_bindings:
  - provider_id: wiremock-payment-api
    runtime_mode: mock
    binding_values:
      mappings_ref: fixtures/wiremock/payment-api/
  - provider_id: oracle-database
    runtime_mode: ephemeral
    binding_values:
      connection:
        secret_ref: generated://oracle-ephemeral.connection
      dialect: oracle
  - provider_id: nats-event-bus
    runtime_mode: ephemeral
    binding_values:
      connection:
        secret_ref: generated://nats-ephemeral.connection
      subject: payments.accepted
      timeout: PT30S
      poll_interval: PT0.5S
