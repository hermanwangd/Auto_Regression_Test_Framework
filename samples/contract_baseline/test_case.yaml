dsl_version: v0.2
test_case_id: RP-FWK-CONTRACT-SAMPLE-TC-001
title: Contract sample validates mock API, DB fixture, and event evidence
status: active
revision: 1
source_refs:
  acceptance_criteria: docs/08-release/release-packages/RP-FWK-CONTRACT-SAMPLE/acceptance_criteria.md#AC-001
labels:
  rp_id: RP-FWK-CONTRACT-SAMPLE
  feature_id: F007
  tags: [contract, dry-run, p0-provider]
compatible_profiles: [ci, sit]
targets:
  payment_api_mock:
    provider_id: wiremock-payment-api
  order_database:
    provider_id: oracle-database
  event_bus:
    provider_id: nats-event-bus
data:
  payment_request:
    ref: fixtures/payment_request.json
  order_seed:
    ref: fixtures/sample_db_seed.yaml
  payment_api_mappings:
    ref: fixtures/wiremock/payment-api/mappings.yaml
  order_cleanup:
    ref: fixtures/sample_db_cleanup.yaml
  payment_event_expected:
    ref: expected_results/sample_expected.json
setup:
  operations:
    - id: seed_order
      target: order_database
      operation: db_seed
      inputs:
        sql_ref:
          ref: ${data.order_seed}
    - id: load_payment_stub
      target: payment_api_mock
      operation: load_stubs
      inputs:
        mock.mappings_ref:
          ref: ${data.payment_api_mappings}
cleanup:
  operations:
    - id: cleanup_order
      target: order_database
      operation: db_cleanup
      inputs:
        sql_ref:
          ref: ${data.order_cleanup}
execute:
  operations:
    - id: verify_payment_mock_request
      target: payment_api_mock
      operation: verify_requests
      inputs:
        mock.request_filter:
          ref: fixtures/wiremock/payment-request-filter.json
        mock.expected_count:
          ref: expected_results/sample_expected.json#/http/expected_count
      outputs:
        request_journal: request_journal
        matched_count: matched_count
    - id: query_order
      target: order_database
      operation: db_query
      inputs:
        query_ref:
          ref: fixtures/sql/find_order.sql
        params.order_id:
          ref: expected_results/sample_expected.json#/db/order_id
      outputs:
        query_evidence_ref: query_evidence_ref
        row_count: row_count
    - id: publish_payment_event
      target: event_bus
      operation: nats_publish
      inputs:
        subject:
          ref: expected_results/sample_expected.json#/event/subject
        payload_ref:
          ref: expected_results/sample_expected.json#/event/payload
      outputs:
        subject: subject
        published: published
        published_at: published_at
        event_evidence_ref: event_evidence_ref
verify:
  checks:
    - id: mock_called_once
      type: http_mock_called
      actual:
        ref: ${execute.verify_payment_mock_request.outputs.matched_count}
      expected: 1
    - id: order_exists
      type: db_record_exists
      target: order_database
      query:
        ref: fixtures/sql/find_order.sql
      expected_ref: expected_results/sample_expected.json#/db
      options:
        timeout: PT30S
        poll_interval: PT2S
    - id: event_payload_matches
      type: event_payload_match
      target: event_bus
      event:
        subject_ref: expected_results/sample_expected.json#/event/subject
        consume_from: test_start_time
      expected_ref: expected_results/sample_expected.json#/event/payload
      options:
        timeout: PT30S
        poll_interval: PT2S
evidence:
  required:
    - provider-evidence/payment-api/request_journal.yaml
    - query-evidence/order_database/query_result.yaml
    - event-evidence/nats_event_bus/published_message.yaml
    - assertion-results/mock_called_once.yaml
    - cleanup-results/cleanup_order.yaml
runtime:
  timeout: PT2M
  retry:
    max_attempts: 1
