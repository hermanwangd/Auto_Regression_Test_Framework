profile_id: ci
execution_mode: ci
trigger: ci_pr
environment_binding_ref: environment_bindings/ci.yaml
isolation_scope: per_run
dependency_policy:
  require_readiness_evidence: false
  allow_framework_managed_dependencies: true
dependency_substitution_policy:
  allowed_runtime_modes: [mock, stub, ephemeral]
  mock_evidence_release_claim: prohibited
dependency_provisioning_policy:
  allowed_provisioners: [testcontainers]
  dependencies:
    - dependency_id: oracle-ephemeral
      provider_id: oracle-database
      dependency_type: oracle-compatible-db
      image_ref_or_catalog_ref: testcontainers.oracle.free
      startup_timeout: PT120S
      readiness_check: jdbc_connect
      cleanup_scope: per_run
      output_binding_keys:
        connection.secret_ref: oracle-ephemeral.connection
    - dependency_id: nats-ephemeral
      provider_id: nats-event-bus
      dependency_type: nats
      image_ref_or_catalog_ref: testcontainers.nats.default
      startup_timeout: PT60S
      readiness_check: broker_connect
      cleanup_scope: per_run
      output_binding_keys:
        connection.secret_ref: nats-ephemeral.connection
        subject: nats-ephemeral.subject
max_duration: PT15M
data_policy:
  approved_expected_results_required: true
  production_data_allowed: false
  generated_data_allowed: true
  secrets_must_use_refs: true
