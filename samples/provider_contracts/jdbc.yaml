provider_contract_version: v0.2
provider_type: jdbc_database
runtime_modes: [native, mock, ephemeral]
binding_keys:
  jdbc_url:
    required: true
    source: environment_binding
  username:
    required: true
    source: environment_binding
  password:
    required: true
    source: environment_binding_secret_ref
defaults:
  timeout_seconds: 60
  retry: 0
valid_provider_instance_shape:
  required_fields: [provider_id, provider_type, runtime_modes, binding_keys]
  allowed_fields: [provider_id, provider_type, runtime_modes, binding_keys, defaults, readiness, operations, evidence, failure_mapping, safety, labels]
  binding_keys: [jdbc_url, username, password]
operations:
  execute_script:
    allowed_inputs: [db.script_ref, db.parameters.*, db.transaction, db.timeout]
    required_inputs: [db.script_ref]
    output_refs: [script_result, affected_rows, duration_ms]
  query:
    allowed_inputs: [db.sql_ref, db.parameters.*, db.max_rows, db.timeout]
    required_inputs: [db.sql_ref]
    output_refs: [query_result, row_count, duration_ms]
evidence:
  outputs: [script_result, query_result, affected_rows, error]
  redact: [password]
failure_mapping:
  allowed_codes: [PROVIDER_UNAVAILABLE, PROVIDER_TIMEOUT, OPERATION_FAILED, ASSERTION_FAILED, CLEANUP_FAILED, EVIDENCE_INVALID]
