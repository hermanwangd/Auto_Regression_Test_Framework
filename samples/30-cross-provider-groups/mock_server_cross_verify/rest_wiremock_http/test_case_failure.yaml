dsl_version: v0.2
test_case_id: MOCK-SERVER-CROSS-VERIFY-REST-TC-FAILURE-001
title: Cross-verify WireMock HTTP mock failure evidence
status: active
revision: 1
source_refs:
  framework_requirement: docs/03-acceptance/04_acceptance_criteria.md#mock-server-cross-provider-verification
labels:
  capability: mock_server_cross_verify
  evidence_classification: framework_provider_capability_only
  downstream_release_evidence: false
compatible_profiles: [local_wiremock_http]
targets:
  payment_mock:
    provider_id: wiremock-payment-api
  payment_api:
    provider_id: payment-api-client
data:
  payment_success_stub:
    ref: fixtures/wiremock/payment_success_stub.json
  payment_request:
    ref: fixtures/payment_request.json
  expected_response:
    ref: expected_results/payment_response.json
setup:
  operations:
    - id: load_payment_stub
      target: payment_mock
      operation: load_stubs
      inputs:
        mock.mappings_ref:
          ref: ${data.payment_success_stub}
        mock.reset_before_load:
          value: true
execute:
  operations:
    - id: submit_payment
      target: payment_api
      operation: http_request
      inputs:
        request.method:
          value: POST
        request.path:
          value: /payments
        request.headers.content-type:
          value: application/json
        request.body:
          ref: ${data.payment_request}
      outputs:
        response.status: response.status
        response.headers: response.headers
        response.body: response.body
        response.duration_ms: response.duration_ms
verify:
  checks:
    - id: payment_response_status
      type: value_equals
      actual:
        ref: ${execute.submit_payment.outputs.response.status}
      expected: 200
    - id: payment_response_body
      type: json_match
      actual:
        ref: ${execute.submit_payment.outputs.response.body}
      expected_ref: expected_results/payment_response.json
      ignore_paths: [provider]
cleanup:
  operations:
    - id: reset_payment_mock
      target: payment_mock
      operation: reset_mock
      inputs: {}
evidence:
  required:
    - evidence_index.yaml
    - provider-evidence/wiremock/request_journal.json
    - provider-evidence/http/response.json
    - assertions/payment_response_status.yaml
    - assertions/payment_response_body.json
    - batch/batch.yaml
runtime:
  timeout: PT30S
  retry:
    max_attempts: 1
