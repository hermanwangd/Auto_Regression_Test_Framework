provider_instance_version: v0.2
provider_id: wiremock-payment-api
provider_type: wiremock_http_mock
runtime_modes: [mock]
defaults:
  startup_timeout: PT10S
  reset_before_load: true
  request_journal_scope: per_run
operations:
  load_stubs:
    outputs: [base_url, loaded_stub_count, injected_stub, server_log]
  reset_mock:
    outputs: [cleanup_log, server_log]
evidence:
  capture: [base_url, server_log, injected_stub, cleanup_log, failure_detail]
failure_mapping:
  provider_unavailable: PROVIDER_UNAVAILABLE
  stub_missing: PROVIDER_STUB_MISSING
  cleanup_failed: OPERATION_FAILED
labels:
  evidence_classification: framework_provider_capability_only
  downstream_release_evidence: false
