env_profile_id: local_grpc_mock
execution_mode: local
providers:
  customer-grpc-mock:
    runtime_mode: mock
    bindings:
      port_strategy: dynamic
      descriptor_ref:
        ref: proto/customer.desc.b64
      service_name: com.example.customer.CustomerService
  customer-grpc-client:
    runtime_mode: native
    bindings:
      target:
        generated_ref: generated://customer-grpc-mock.target_uri
