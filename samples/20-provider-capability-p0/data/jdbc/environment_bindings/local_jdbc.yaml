environment_id: local-jdbc
profile: local_jdbc
provider_bindings:
  - provider_id: oracle-like-db
    provider_instance_ref: provider_instances/oracle_like.yaml
    runtime_mode: ephemeral
    binding_values:
      connection:
        secret_ref: generated://provider-capability/oracle-like/connection
      dialect: oracle
      schema: PUBLIC
      strict_params: true
      query_timeout: PT10S
      masking_policy:
        redact: [connection, password, secret, token]
  - provider_id: db2-like-db
    provider_instance_ref: provider_instances/db2_like.yaml
    runtime_mode: ephemeral
    binding_values:
      connection:
        secret_ref: generated://provider-capability/db2-like/connection
      dialect: db2
      schema: PUBLIC
      strict_params: true
      query_timeout: PT10S
      masking_policy:
        redact: [connection, password, secret, token]
evidence_policy:
  evidence_classification: framework_provider_capability_only
  downstream_release_evidence: false
