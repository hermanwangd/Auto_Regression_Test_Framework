dsl_version: v0.2
test_case_id: JDBC-DB2-CRUD-TC-001
title: JDBC DB2 CRUD provider capability
status: active
revision: 1
source_refs:
  acceptance_criteria: docs/03-acceptance/04_acceptance_criteria.md#track-c-jdbc
labels:
  capability: jdbc
  evidence_classification: framework_provider_capability_only
compatible_profiles: [local_jdbc]
targets:
  db2_like_db:
    provider_id: db2-like-db
data:
  table_seed:
    ref: fixtures/db_seed.sql
  table_seed_cleanup:
    ref: fixtures/db_cleanup.sql
  table_seed_expected:
    ref: expected_results/db_expected.json
  crud_insert:
    ref: fixtures/crud_insert_order.sql
  crud_update:
    ref: fixtures/crud_update_order.sql
  crud_delete:
    ref: fixtures/crud_delete_order.sql
  crud_query:
    ref: queries/crud_order_by_id_db2.sql
  crud_expected:
    ref: expected_results/crud_expected.json
  crud_deleted_expected:
    ref: expected_results/crud_deleted_expected.json
setup:
  operations:
    - id: db2_prepare_orders_table
      target: db2_like_db
      operation: db_seed
      inputs:
        sql_ref:
          ref: ${data.table_seed}
        params.order_id:
          ref: expected_results/db_expected.json#/order_id
execute:
  operations:
    - id: db2_create_order
      target: db2_like_db
      operation: db_seed
      inputs:
        sql_ref:
          ref: ${data.crud_insert}
        params.order_id:
          ref: expected_results/crud_expected.json#/order_id
      outputs:
        affected_rows: affected_rows
        duration_ms: duration_ms
    - id: db2_read_created_order
      target: db2_like_db
      operation: db_query
      inputs:
        query_ref:
          ref: ${data.crud_query}
        params.order_id:
          ref: expected_results/crud_expected.json#/order_id
      outputs:
        row_count: row_count
        sample_rows: sample_rows
        duration_ms: duration_ms
        query_evidence_ref: query_evidence_ref
    - id: db2_update_order
      target: db2_like_db
      operation: db_seed
      inputs:
        sql_ref:
          ref: ${data.crud_update}
        params.order_id:
          ref: expected_results/crud_expected.json#/order_id
      outputs:
        affected_rows: affected_rows
        duration_ms: duration_ms
    - id: db2_read_updated_order
      target: db2_like_db
      operation: db_query
      inputs:
        query_ref:
          ref: ${data.crud_query}
        params.order_id:
          ref: expected_results/crud_expected.json#/order_id
      outputs:
        row_count: row_count
        sample_rows: sample_rows
        duration_ms: duration_ms
        query_evidence_ref: query_evidence_ref
    - id: db2_delete_order
      target: db2_like_db
      operation: db_cleanup
      inputs:
        sql_ref:
          ref: ${data.crud_delete}
        params.order_id:
          ref: expected_results/crud_expected.json#/order_id
      outputs:
        affected_rows: affected_rows
        duration_ms: duration_ms
    - id: db2_read_deleted_order
      target: db2_like_db
      operation: db_query
      inputs:
        query_ref:
          ref: ${data.crud_query}
        params.order_id:
          ref: expected_results/crud_expected.json#/order_id
      outputs:
        row_count: row_count
        sample_rows: sample_rows
        duration_ms: duration_ms
        query_evidence_ref: query_evidence_ref
verify:
  checks:
    - id: db2_deleted_order_record_absent
      type: db_record_exists
      target: db2_like_db
      query:
        ref: queries/crud_order_by_id_db2.sql
      expected_ref: expected_results/crud_deleted_expected.json
      options:
        timeout: PT20S
        poll_interval: PT2S
cleanup:
  operations:
    - id: db2_cleanup_order_safety
      target: db2_like_db
      operation: db_cleanup
      inputs:
        sql_ref:
          ref: ${data.crud_delete}
        params.order_id:
          ref: expected_results/crud_expected.json#/order_id
      outputs:
        affected_rows: affected_rows
        duration_ms: duration_ms
    - id: db2_cleanup_prepare_row
      target: db2_like_db
      operation: db_cleanup
      inputs:
        sql_ref:
          ref: ${data.table_seed_cleanup}
        params.order_id:
          ref: expected_results/db_expected.json#/order_id
      outputs:
        affected_rows: affected_rows
        duration_ms: duration_ms
evidence:
  required:
    - provider-evidence/jdbc/seed_JDBC-DB2-CRUD-TC-001__db2_prepare_orders_table.yaml
    - provider-evidence/jdbc/seed_JDBC-DB2-CRUD-TC-001__db2_create_order.yaml
    - provider-evidence/jdbc/query_JDBC-DB2-CRUD-TC-001__db2_read_created_order.yaml
    - provider-evidence/jdbc/seed_JDBC-DB2-CRUD-TC-001__db2_update_order.yaml
    - provider-evidence/jdbc/query_JDBC-DB2-CRUD-TC-001__db2_read_updated_order.yaml
    - provider-evidence/jdbc/cleanup_JDBC-DB2-CRUD-TC-001__db2_delete_order.yaml
    - provider-evidence/jdbc/query_JDBC-DB2-CRUD-TC-001__db2_read_deleted_order.yaml
    - provider-evidence/jdbc/cleanup_JDBC-DB2-CRUD-TC-001__db2_cleanup_order_safety.yaml
    - provider-evidence/jdbc/cleanup_JDBC-DB2-CRUD-TC-001__db2_cleanup_prepare_row.yaml
runtime:
  timeout: PT1M
  retry:
    max_attempts: 1
