dsl_version: v0.2
test_case_id: COMMON-VERIFY-TC-001
title: Common verifier P0 JSON schema and file comparison
status: active
revision: 1
source_refs:
  acceptance_criteria: docs/03-acceptance/common_verify.md#AC-COMMON-VERIFY-001
labels:
  feature_id: PR-006
  tags: [common-verify, p0]
compatible_profiles: [local_verify]
targets:
  verifier:
    provider_id: local-common-verifier
execute: []
data:
  payload:
    ref: expected_results/expected_payload.json
  schema:
    ref: expected_results/expected_schema.json
  file:
    ref: expected_results/expected_file.txt
verify:
  checks:
    - id: payload_matches
      type: json_match
      target: verifier
      expected_ref: expected_results/expected_payload.json
      actual_ref: actual_samples/actual_payload.json
      options:
        ignore_paths: [metadata.generated_at]
        normalize: canonical_json
        ignore_order: true
      inputs:
        expected_ref:
          ref: expected_results/expected_payload.json
        actual_ref:
          ref: actual_samples/actual_payload.json
        normalize:
          value: canonical_json
        ignore_order:
          value: "true"
    - id: payload_schema_matches
      type: schema_match
      target: verifier
      schema_ref: expected_results/expected_schema.json
      actual_ref: actual_samples/actual_payload.json
      options:
        normalize: canonical_json
      inputs:
        schema_ref:
          ref: expected_results/expected_schema.json
        actual_ref:
          ref: actual_samples/actual_payload.json
    - id: file_matches
      type: file_diff
      target: verifier
      expected_ref: expected_results/expected_file.txt
      actual_ref: actual_samples/actual_file.txt
      options:
        normalize: trim_lines
        ignore_order: false
      inputs:
        expected_ref:
          ref: expected_results/expected_file.txt
        actual_ref:
          ref: actual_samples/actual_file.txt
evidence:
  required:
    - assertions/payload_matches.yaml
    - assertions/payload_schema_matches.yaml
    - assertions/file_matches.yaml
runtime:
  timeout: PT1M
  retry:
    max_attempts: 0
