dsl_version: v0.2
test_case_id: PROVIDER-CAPABILITY-COMPARE-TC-001
title: JSON schema and file diff verification capability
status: active
revision: 1
source_refs:
  acceptance_criteria: docs/03-acceptance/04_acceptance_criteria.md#track-c-compare
labels:
  capability: compare
  evidence_classification: framework_provider_capability_only
compatible_profiles: [local_compare]
targets:
  compare_engine:
    provider_id: compare-engine
data:
  expected_payload:
    ref: expected_results/expected_payload.json
  expected_schema:
    ref: expected_results/expected_schema.json
  expected_file:
    ref: expected_results/expected_file.json
execute: []
verify:
  checks:
    - id: payload_json_matches
      type: json_match
      target: compare_engine
      actual_ref: actual_samples/actual_payload.json
      expected_ref: expected_results/expected_payload.json
      options:
        ignore_paths: [generatedAt]
        ignore_order: true
        normalize: canonical_json
      inputs:
        expected_ref:
          ref: expected_results/expected_payload.json
        actual_ref:
          ref: actual_samples/actual_payload.json
        ignore_order:
          value: "true"
        normalize:
          value: canonical_json
    - id: payload_schema_matches
      type: schema_match
      target: compare_engine
      actual_ref: actual_samples/actual_payload.json
      schema_ref: expected_results/expected_schema.json
      inputs:
        schema_ref:
          ref: expected_results/expected_schema.json
        actual_ref:
          ref: actual_samples/actual_payload.json
    - id: file_diff_matches
      type: file_diff
      target: compare_engine
      actual_ref: actual_samples/actual_file.json
      expected_ref: expected_results/expected_file.json
      options:
        normalize: trim_lines
        ignore_order: true
      inputs:
        expected_ref:
          ref: expected_results/expected_file.json
        actual_ref:
          ref: actual_samples/actual_file.json
        normalize:
          value: trim_lines
        ignore_order:
          value: "true"
evidence:
  required:
    - assertions/payload_json_matches.yaml
    - assertions/payload_schema_matches.yaml
    - assertions/file_diff_matches.yaml
    - diffs/file_diff_matches.diff
runtime:
  timeout: PT30S
  retry:
    max_attempts: 1
