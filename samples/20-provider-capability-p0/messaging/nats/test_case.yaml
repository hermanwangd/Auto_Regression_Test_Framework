dsl_version: v0.2
test_case_id: NATS-CAPABILITY-TC-001
title: NATS event provider capability
status: active
revision: 1
source_refs:
  acceptance_criteria: docs/03-acceptance/04_acceptance_criteria.md#track-c-nats
labels:
  capability: nats
  evidence_classification: framework_provider_capability_only
compatible_profiles: [local_nats]
targets:
  event_bus:
    provider_id: local-nats-event-bus
data:
  event_input:
    ref: fixtures/event_input.json
  event_expected:
    ref: expected_results/event_expected.json
execute:
  operations:
    - id: publish_event
      target: event_bus
      operation: nats_publish
      inputs:
        subject:
          ref: expected_results/event_expected.json#/subject
        payload_ref:
          ref: ${data.event_input}
      outputs:
        subject: subject
        published: published
        published_at: published_at
        event_evidence_ref: event_evidence_ref
verify:
  checks:
    - id: event_published
      type: event_published
      target: event_bus
      inputs:
        subject:
          ref: expected_results/event_expected.json#/subject
        consume_from:
          value: test_start_time
        timeout:
          value: PT5S
        poll_interval:
          value: PT0.05S
      options:
        timeout: PT5S
        poll_interval: PT0.05S
    - id: event_payload_match
      type: event_payload_match
      target: event_bus
      inputs:
        subject:
          ref: expected_results/event_expected.json#/subject
        expected_ref:
          ref: expected_results/event_expected.json#/payload
        consume_from:
          value: test_start_time
        timeout:
          value: PT5S
        poll_interval:
          value: PT0.05S
      options:
        timeout: PT5S
        poll_interval: PT0.05S
evidence:
  required:
    - event-evidence/nats/observed_event.yaml
    - assertions/event_published.yaml
    - assertions/event_payload_match.yaml
runtime:
  timeout: PT1M
  retry:
    max_attempts: 1
