environment_id: local-nats
profile: local_nats
provider_bindings:
  - provider_id: local-nats-event-bus
    provider_instance_ref: provider_instances/local_nats.yaml
    runtime_mode: mock
    binding_values:
      connection:
        local_ref: approved_local_nats_ref
      subject: orders.ready
      timeout: PT5S
      poll_interval: PT0.05S
      masking_policy:
        redact: [connection, password, secret, token, authorization]
evidence_policy:
  evidence_classification: framework_provider_capability_only
  downstream_release_evidence: false
