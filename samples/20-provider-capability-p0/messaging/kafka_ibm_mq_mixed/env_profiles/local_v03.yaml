profile_id: local_v03
execution_mode: local
isolation: per_run
evidence_classification: framework_verification_only

targets:
  order_events:
    runtime_mode: mock
    bindings:
      bootstrap_servers: mock://local-kafka
      topic: orders.v03.mixed
      consumer_group: regress-v03-mixed
      timeout: PT2S
      poll_interval: PT0.01S
  payment_queue:
    runtime_mode: mock
    bindings:
      queue_manager: QM.V03.MIXED
      channel: DEV.APP.SVRCONN
      conn_name: mock.local(1414)
      queue: PAYMENTS.V03.MIXED
      credential.secret_ref: env://IBM_MQ_MOCK_CREDENTIAL_REF
      timeout: PT2S
      poll_interval: PT0.01S
