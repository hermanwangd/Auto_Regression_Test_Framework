dsl_version: v0.3
test_case_id: MIXED-MESSAGING-V03-TC-001
title: Kafka and IBM MQ providers run in one v0.3 suite

setup: []

execute:
  - id: publish_order_event
    target: order_events
    op: kafka_publish
    with:
      key: ORD-MIXED-V03-001
      payload_ref: artifact://fixtures/order_event.json
  - id: put_payment_message
    target: payment_queue
    op: mq_put
    with:
      payload_ref: artifact://fixtures/payment_message.json
      correlation_id: CORR-MIXED-V03-001

verify:
  - id: kafka_payload_matches
    type: provider_check
    target: order_events
    op: kafka_payload_match
    with:
      key: ORD-MIXED-V03-001
      expected_ref: artifact://expected_results/order_event.json
      consume_from: earliest
      timeout: PT2S
      poll_interval: PT0.01S
  - id: mq_payload_matches
    type: provider_check
    target: payment_queue
    op: mq_payload_match
    with:
      expected_ref: artifact://expected_results/payment_message.json
      correlation_id: CORR-MIXED-V03-001
      timeout: PT2S
      poll_interval: PT0.01S

cleanup: []
