dsl_version: v0.3
test_case_id: JDBC-V03-TC-001
title: JDBC seed, query, and cleanup through v0.3 target contract

setup:
  - id: seed_order
    target: order_db
    op: db_seed
    with:
      sql_ref: artifact://fixtures/seed_order.sql
      params.order_id: ORD-V03-001
      params.status: CREATED

execute:
  - id: query_order
    target: order_db
    op: db_query
    with:
      query_ref: artifact://queries/find_order_by_id.sql
      params.order_id: ORD-V03-001

verify:
  - id: one_order_found
    type: assertion
    assert:
      actual: step://query_order/row_count
      operator: equals
      expected: 1

cleanup:
  - id: cleanup_order
    target: order_db
    op: db_cleanup
    with:
      sql_ref: artifact://fixtures/cleanup_order.sql
      params.order_id: ORD-V03-001
