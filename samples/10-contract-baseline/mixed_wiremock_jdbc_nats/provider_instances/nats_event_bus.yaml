provider_instance_version: v0.2
provider_id: nats-event-bus
provider_type: nats
runtime_modes: [native, ephemeral]
defaults:
  timeout: PT30S
  poll_interval: PT0.5S
  consume_from: test_start_time
operations:
  nats_publish:
    outputs: [subject, published, published_at, event_evidence_ref]
  nats_observe:
    outputs: [subject, observed_count, matched, duration_ms, event_evidence_ref]
  event_published:
    outputs: [subject, observed_count, matched, duration_ms, event_evidence_ref]
  event_payload_match:
    outputs: [subject, observed_count, matched, matched_fields, duration_ms, event_evidence_ref]
evidence:
  capture: [subject, consume_from, observation_window, attempts, observed_count, matched, matched_fields, masked_observed_payload, duration_ms, status, failure_code]
failure_mapping:
  event_not_found: ASSERTION_FAILED
  payload_mismatch: ASSERTION_FAILED
  timeout: NATS_TIMEOUT
