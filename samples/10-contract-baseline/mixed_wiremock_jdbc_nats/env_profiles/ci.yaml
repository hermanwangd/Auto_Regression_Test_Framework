env_profile_id: ci
execution_mode: ci
providers:
  wiremock-payment-api:
    runtime_mode: mock
    bindings:
      mappings_ref:
        ref: fixtures/wiremock/payment-api/
  oracle-database:
    runtime_mode: ephemeral
    bindings:
      connection:
        local_ref: approved_local_h2_oracle
      dialect: oracle
  nats-event-bus:
    runtime_mode: ephemeral
    bindings:
      connection:
        local_ref: approved_local_nats_ref
      subject: payments.accepted
      timeout: PT30S
      poll_interval: PT0.5S
