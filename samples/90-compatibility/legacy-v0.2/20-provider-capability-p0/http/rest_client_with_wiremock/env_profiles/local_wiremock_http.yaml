env_profile_id: local_wiremock_http
execution_mode: local
providers:
  wiremock-payment-api:
    runtime_mode: mock
    bindings:
      port_strategy: dynamic
      mappings_ref:
        ref: fixtures/wiremock/
  payment-api-client:
    runtime_mode: native
    bindings:
      base_url:
        generated_ref: generated://wiremock-payment-api.base_url
