env_profile_id: local_messaging
execution_mode: local
providers:
  order-events:
    runtime_mode: mock
    bindings:
      bootstrap_servers: approved_local_kafka_ref
      topic: orders.created
      consumer_group: artf-local-kafka
      timeout: PT5S
      poll_interval: PT0.05S
  payment-mq:
    runtime_mode: mock
    bindings:
      queue_manager: QM1
      channel: DEV.APP.SVRCONN
      conn_name: localhost(1414)
      queue: PAYMENT.REQUEST.LOCAL
      credential:
        secret_ref: secret://local/ibm-mq
      timeout: PT5S
      poll_interval: PT0.05S
