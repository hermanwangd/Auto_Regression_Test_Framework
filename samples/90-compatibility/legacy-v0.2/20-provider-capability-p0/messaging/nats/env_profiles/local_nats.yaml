env_profile_id: local_nats
execution_mode: local
providers:
  local-nats-event-bus:
    runtime_mode: mock
    bindings:
      connection:
        local_ref: approved_local_nats_ref
      subject: orders.ready
      timeout: PT5S
      poll_interval: PT0.05S
      masking_policy:
        redact:
        - connection
        - password
        - secret
        - token
        - authorization
