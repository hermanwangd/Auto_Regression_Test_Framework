env_profile_id: local_ibm_mq
execution_mode: local
providers:
  payment-mq:
    runtime_mode: mock
    bindings:
      queue_manager: QM.LOCAL
      channel: APP.SVRCONN
      conn_name: approved_local_mq_ref
      queue: PAYMENT.REQUEST.LOCAL
      credential:
        secret_ref: env://LOCAL_MQ_CREDENTIAL
      timeout: PT5S
      poll_interval: PT0.05S
