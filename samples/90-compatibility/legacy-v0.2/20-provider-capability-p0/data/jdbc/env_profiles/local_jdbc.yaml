env_profile_id: local_jdbc
execution_mode: local
providers:
  oracle-like-db:
    runtime_mode: ephemeral
    bindings:
      connection:
        secret_ref: generated://provider-capability/oracle-like/connection
      dialect: oracle
      schema: PUBLIC
      strict_params: true
      query_timeout: PT10S
      masking_policy:
        redact:
        - connection
        - password
        - secret
        - token
  db2-like-db:
    runtime_mode: ephemeral
    bindings:
      connection:
        secret_ref: generated://provider-capability/db2-like/connection
      dialect: db2
      schema: PUBLIC
      strict_params: true
      query_timeout: PT10S
      masking_policy:
        redact:
        - connection
        - password
        - secret
        - token
