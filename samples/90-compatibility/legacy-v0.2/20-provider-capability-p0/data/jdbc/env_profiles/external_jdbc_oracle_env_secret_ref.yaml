env_profile_id: external_jdbc_oracle_env_secret_ref
execution_mode: ci
isolation_scope: per_run
dependency_policy:
  require_readiness_evidence: true
  allow_framework_managed_dependencies: false
dependency_substitution_policy:
  allowed_runtime_modes:
  - native
  mock_evidence_release_claim: prohibited
dependency_provisioning_policy:
  allowed_provisioners:
  - external_ci_pre_step
data_policy:
  approved_expected_results_required: true
  production_data_allowed: false
  generated_data_allowed: true
  secrets_must_use_refs: true
providers:
  oracle-like-db:
    runtime_mode: native
    bindings:
      connection:
        secret_ref: env://JDBC_CONNECTION
      dialect: oracle
      schema: APP
      strict_params: true
      query_timeout: PT10S
      masking_policy:
        redact:
        - connection
        - password
        - secret
        - token
