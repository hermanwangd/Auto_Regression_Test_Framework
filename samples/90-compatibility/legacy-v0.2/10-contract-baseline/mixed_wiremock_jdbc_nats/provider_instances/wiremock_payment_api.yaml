provider_instance_version: v0.2
provider_id: wiremock-payment-api
provider_type: wiremock_http_mock
runtime_modes: [mock]
defaults:
  timeout_seconds: 60
operations:
  load_stubs:
    outputs: [loaded_stub_count, server_log]
  verify_requests:
    outputs: [request_journal, matched_count]
evidence:
  capture: [request_journal, server_log]
failure_mapping:
  provider_unavailable: PROVIDER_UNAVAILABLE
  assertion_failed: ASSERTION_FAILED
