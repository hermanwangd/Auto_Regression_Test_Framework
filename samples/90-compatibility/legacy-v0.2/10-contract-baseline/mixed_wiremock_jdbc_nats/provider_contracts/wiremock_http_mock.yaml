provider_contract_version: v0.2
provider_type: wiremock_http_mock
runtime_modes: [mock]
binding_keys:
  mappings_ref:
    required: true
    source: environment_binding
defaults:
  timeout_seconds: 60
  retry: 0
valid_provider_instance_shape:
  required_fields: [provider_id, provider_type, runtime_modes, binding_keys]
  allowed_fields: [provider_id, provider_type, runtime_modes, binding_keys, defaults, readiness, operations, evidence, failure_mapping, safety, labels]
  binding_keys: [mappings_ref]
operations:
  load_stubs:
    allowed_inputs: [mock.mappings_ref, mock.reset_before_load]
    required_inputs: [mock.mappings_ref]
    output_refs: [loaded_stub_count, server_log]
  verify_requests:
    allowed_inputs: [mock.request_filter, mock.expected_count, mock.body_pattern]
    required_inputs: [mock.request_filter]
    output_refs: [request_journal, matched_count]
evidence:
  outputs: [request_journal, server_log, timing, error]
  redact: []
failure_mapping:
  allowed_codes: [PROVIDER_UNAVAILABLE, PROVIDER_TIMEOUT, OPERATION_FAILED, ASSERTION_FAILED, EVIDENCE_INVALID]
