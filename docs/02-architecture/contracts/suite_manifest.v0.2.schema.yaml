contract_version: v0.2
artifact: suite_manifest
status: framework_owned_current_stage
version_compatibility:
  supported_versions: [v0.2]
  unsupported_version_behavior: block_before_execution
required_field_rules:
  single_suite:
    - suite_id
    - selection
  suite_group:
    - contract_version
    - suite_type
    - suite_id
    - profile
    - test_cases
suite_types:
  single_suite:
    default_when_omitted: true
    required_fields:
      - suite_id
      - selection
  suite_group:
    purpose: Aggregate checked-in child suite manifests so provider capability samples can run multiple test cases and summarize results.
    required_fields:
      - contract_version
      - suite_type
      - suite_id
      - profile
      - test_cases
    test_case_required_fields:
      - id
      - ref
      - profile
    test_case_optional_fields:
      expected_status:
        default: passed
        allowed_values: [passed, failed]
    ref_rules:
      - Child suite refs are relative to the suite group manifest directory.
      - Child suite refs must remain under the suite group directory after path normalization.
      - Child test ids must be unique within one suite group.
    dry_run_behavior:
      - Validate all child suites and print provider_instances_used, provider_types_used, and child_suites.
      - Do not invoke provider runtime or create provider execution evidence.
    run_outputs:
      - suite_summary_json
      - suite_summary_yaml
      - allure_results_dir
      - expected_failure_count
selection_modes:
  - test_id
  - suite
  - tag
  - profile
optional_fields:
  provider_contract_resolution:
    default_mode: framework_builtin
    allowed_modes: [framework_builtin, suite_override, snapshot]
    custom_provider_contracts_default: custom-provider-contracts
    allowed_provider_types_required_for_custom_types: true
must_not_contain:
  - provider overrides
  - product topology inference
validation_output_fields:
  - ap
  - file_path
  - field_path
  - suite_id
  - selection_mode
  - severity
  - reason
  - owner_action
evidence_outputs:
  - suite_selection_report
  - empty_selection_blocking_report
unsupported_behavior:
  unknown_test_id: block_before_execution
  unknown_tag: block_before_execution
  incompatible_profile: block_before_execution
  provider_override: block_before_execution
failure_classification: schema_error
