contract_version: v0.2
artifact: secret_guardrails
status: framework_owned_current_stage
purpose: >
  Defines where secrets may appear by reference and where raw values must be
  rejected or masked.
allowed_secret_forms:
  - secret_ref
  - env_ref
  - vault_ref
  - ci_secret_ref
  - generated_secret_ref
blocked_raw_value_patterns:
  - password
  - token
  - api_key
  - private_key
  - jdbc_password
  - authorization_header
must_not_contain_raw_secrets:
  - DSL Test Case
  - data
  - operation inputs
  - Env_Profile
  - Provider Instance
  - Provider Contract
  - result JSON
  - evidence files
  - CLI stdout
  - report output
allowed_locations:
  env_profile:
    secret_fields_must_use_ref: true
  provider_instance:
    may_reference_secret_binding_key_names: true
    may_contain_secret_values: false
  evidence:
    may_contain_masked_values: true
    may_contain_raw_values: false
validation_behavior:
  raw_secret_in_input: block_before_execution
  raw_secret_in_result: block_result_publication
  raw_secret_in_evidence: block_evidence_publication
  raw_secret_in_report: block_report_publication
masking_rules:
  replacement: "****"
  preserve_ref_uri: true
  preserve_last_four: false
evidence_outputs:
  - secret_guardrail_report
  - masking_report
failure_classification: secret_resolution_error
