provider_contract_version: v0.2
provider_type: jdbc_database
runtime_modes: [native, mock, ephemeral]
binding_keys:
  jdbc_url:
    required: true
    source: env_profile
  username:
    required: true
    source: env_profile
  password:
    required: true
    source: env_profile_secret_ref
  dialect:
    required: true
    source: env_profile
defaults:
  timeout_seconds: 60
  retry: 0
valid_provider_instance_shape:
  required_fields: [provider_id, provider_type, runtime_modes]
  allowed_fields: [provider_instance_version, provider_id, provider_type, runtime_modes, defaults, readiness, operations, evidence, failure_mapping, safety, labels]
operations:
  execute_script:
    allowed_inputs: [db.script_ref, db.parameters.*, db.transaction, db.timeout]
    required_inputs: [db.script_ref]
    output_refs: [script_result, affected_rows, duration_ms]
  execute_update:
    allowed_inputs: [db.sql_ref, db.parameters.*, db.transaction, db.timeout]
    required_inputs: [db.sql_ref]
    output_refs: [affected_rows, duration_ms]
  query:
    allowed_inputs: [db.sql_ref, db.parameters.*, db.max_rows, db.timeout]
    required_inputs: [db.sql_ref]
    output_refs: [query_result, row_count, duration_ms]
  transaction:
    allowed_inputs: [db.steps_ref, db.rollback_on_error, db.timeout]
    required_inputs: [db.steps_ref]
    output_refs: [transaction_status, affected_rows, duration_ms]
evidence:
  outputs: [script_result, query_result, affected_rows, transaction_status, error]
  redact: [password]
failure_mapping:
  allowed_codes: [PROVIDER_UNAVAILABLE, PROVIDER_TIMEOUT, OPERATION_FAILED, ASSERTION_FAILED, CLEANUP_FAILED, EVIDENCE_INVALID]
dialects:
  allowed: [oracle, db2]
  unsupported_behavior: block_before_execution
