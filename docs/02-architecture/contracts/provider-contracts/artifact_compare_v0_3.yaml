contract_version: v0.3
provider_contract: artifact_compare.v0.3
provider_type: artifact_compare
provider_role: framework_verifier
protocol: file
purpose: Framework-owned artifact comparison contract for DSL v0.3 assertion-only verification.
runtime_modes: [framework]
operation_defaults:
  input:
    value_type: any
    reference_kinds: [literal, artifact, step, generated, env]
    sensitivity: public
  output:
    value_type: any
    sensitivity: public
    bindable: false
    evidence_included: true
  phases: [setup, execute, verify, cleanup]
binding_keys: {}
operations:
  json_match:
    allowed_inputs: [expected_ref, actual_ref, ignore_paths, normalize, ignore_order]
    required_inputs: [expected_ref, actual_ref]
    output_refs: [assertion_evidence_ref, diff_ref]
  schema_match:
    allowed_inputs: [schema_ref, actual_ref, normalize]
    required_inputs: [schema_ref, actual_ref]
    output_refs: [assertion_evidence_ref, diff_ref]
  file_diff:
    allowed_inputs: [expected_ref, actual_ref, normalize, ignore_order]
    required_inputs: [expected_ref, actual_ref]
    output_refs: [assertion_evidence_ref, diff_ref]
evidence:
  outputs: [assertion_diff]
  redact: []
failure_mapping:
  allowed_codes:
    - ASSERTION_FAILED
    - ASSERTION_INPUT_NOT_FOUND
    - SCHEMA_MISMATCH
    - FILE_DIFF_MISMATCH
    - EVIDENCE_INVALID
