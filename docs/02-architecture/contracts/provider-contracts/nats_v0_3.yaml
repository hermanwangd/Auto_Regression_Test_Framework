  - password
  - secret
  - token
  - authorization
failure_mapping:
  allowed_codes:
  - SUBJECT_MISSING
  - PAYLOAD_REF_MISSING
  - PAYLOAD_PARAM_MISSING
  - NATS_CONNECTION_FAILED
  - NATS_PUBLISH_FAILED
  - NATS_OBSERVE_FAILED
  - EVENT_NOT_FOUND
  - PAYLOAD_MISMATCH
  - NATS_TIMEOUT
  - INVALID_DURATION
  - INVALID_INSTANT
  - REF_OUTSIDE_SUITE_ROOT
