---
contract_version: v0.3
provider_contract: nats.v0.3
provider_type: nats
provider_role: messaging_client
protocol: nats
purpose: NATS messaging provider contract for DSL v0.3 publish and observation checks.
runtime_modes:
- mock
- native
- ephemeral
operation_defaults:
  input:
    value_type: any
    reference_kinds: &1
    - literal
    - artifact
    - step
    - generated
    - env
    sensitivity: public
  output:
    value_type: any
    sensitivity: public
    bindable: false
    evidence_included: true
  phases:
  - setup
  - execute
  - verify
  - cleanup
binding_keys:
  connection.local_ref:
    required: false
    source: env_profile
    value_type: string
    reference_kinds:
    - literal
    - generated
    - env
    sensitivity: public
  connection.secret_ref:
    required: false
    source: env_profile_secret_ref
