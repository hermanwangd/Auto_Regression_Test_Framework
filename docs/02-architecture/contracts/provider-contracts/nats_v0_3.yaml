        sensitivity: public
        bindable: false
        evidence_included: true
      published_at:
        value_type: any
        sensitivity: public
        bindable: false
        evidence_included: true
      duration_ms:
        value_type: any
        sensitivity: public
        bindable: false
        evidence_included: true
      event_evidence_ref:
        value_type: any
        sensitivity: public
        bindable: false
        evidence_included: true
