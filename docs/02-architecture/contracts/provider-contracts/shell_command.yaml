provider_contract_version: v0.2
provider_type: shell_command
runtime_modes: [native, mock, stub]
binding_keys:
  command:
    required: true
    source: env_profile
defaults:
  timeout_seconds: 300
  retry: 0
safety:
  rules:
    access_policy_required_when_operations_used: [run_batch, execute_command]
    required_fields:
      - safety.access_policy.allowed_commands
      - safety.access_policy.allow_shell
    prohibited_defaults:
      - safety.access_policy.allow_shell_true_without_approval
valid_provider_instance_shape:
  required_fields: [provider_id, provider_type, runtime_modes]
  allowed_fields: [provider_instance_version, provider_id, provider_type, runtime_modes, defaults, readiness, operations, evidence, failure_mapping, safety, labels]
operations:
  run_batch:
    allowed_inputs: [runner.args.*, runner.env.*, runner.timeout, runner.input_file]
    required_inputs: []
    output_refs: [exit_code, stdout, stderr, output_files, duration_ms]
  execute_command:
    allowed_inputs: [runner.args.*, runner.env.*, runner.timeout, runner.input_file]
    required_inputs: []
    output_refs: [exit_code, stdout, stderr, output_files, duration_ms]
evidence:
  outputs: [command, stdout, stderr, output_files, exit_code, timing, error]
  redact: [runner.env.*]
failure_mapping:
  allowed_codes: [PROVIDER_UNAVAILABLE, PROVIDER_TIMEOUT, OPERATION_FAILED, EVIDENCE_INVALID]
