provider_contract_version: v0.2
provider_type: rest_client
runtime_modes: [native, mock, stub]
binding_keys:
  base_url:
    required: true
    value_type: uri
    allowed_value_kinds: [value, secret_ref, generated_ref]
    allowed_schemes: [http, https, local]
    prohibited_parts: [userinfo]
    prohibited_query_keys: [password, token, access_token, authorization, api_key, secret]
defaults:
  timeout_seconds: 30
  retry: 0
valid_provider_instance_shape:
  required_fields: [provider_id, provider_type, runtime_modes]
  allowed_fields: [provider_instance_version, provider_id, provider_type, runtime_modes, defaults, readiness, operations, evidence, failure_mapping, safety, labels]
operations:
  http_request:
    allowed_inputs: [request.method, request.path, request.query.*, request.headers.*, request.body, request.timeout]
    required_inputs: [request.method, request.path]
    output_refs: [response.status, response.headers, response.body, response.duration_ms]
evidence:
  outputs: [http_request_response, request, response, timing, error]
  redact: [request.headers.authorization, request.headers.cookie]
failure_mapping:
  allowed_codes: [PROVIDER_UNAVAILABLE, PROVIDER_TIMEOUT, OPERATION_FAILED, ASSERTION_FAILED, EVIDENCE_INVALID]
