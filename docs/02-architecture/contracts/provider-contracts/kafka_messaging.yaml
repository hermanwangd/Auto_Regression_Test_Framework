provider_contract_version: v0.2
provider_type: kafka_messaging
status: deprecated_alias
canonical_provider_type: kafka
deprecation_note: Use provider_type `kafka` for new DSL, Provider Instance, Env_Profile, and provider capability work. `kafka_messaging` remains only for compatibility with existing contract-baseline artifacts during v0.2 transition.
runtime_modes: [native, mock, ephemeral]
binding_keys:
  bootstrap_servers:
    required: true
    source: env_profile
defaults:
  timeout_seconds: 30
  retry: 0
valid_provider_instance_shape:
  required_fields: [provider_id, provider_type, runtime_modes]
  allowed_fields: [provider_instance_version, provider_id, provider_type, runtime_modes, defaults, readiness, operations, evidence, failure_mapping, safety, labels]
operations:
  publish_message:
    allowed_inputs: [message.topic, message.key, message.headers.*, message.payload, message.partition, message.timeout]
    required_inputs: [message.topic, message.payload]
    output_refs: [produced_message, offset, partition, timestamp]
  consume_message:
    allowed_inputs: [message.topic, message.consumer_group, message.filter, message.timeout, message.max_records]
    required_inputs: [message.topic]
    output_refs: [consumed_message, offset, partition, timestamp]
evidence:
  outputs: [produced_message, consumed_message, offset, timing, error]
  redact: [message.headers.authorization]
failure_mapping:
  allowed_codes: [PROVIDER_UNAVAILABLE, PROVIDER_TIMEOUT, OPERATION_FAILED, ASSERTION_FAILED, EVIDENCE_INVALID]
