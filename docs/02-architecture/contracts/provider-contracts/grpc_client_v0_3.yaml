contract_version: v0.3
provider_contract: grpc_client.v0.3
provider_type: grpc_client
provider_role: client
protocol: grpc
purpose: gRPC unary client provider contract for DSL v0.3.
runtime_modes: [native, mock, stub]
binding_keys:
  target:
    required: true
    source: env_profile
  descriptor_ref:
    required: false
    source: env_profile
operations:
  unary_call:
    allowed_inputs: [grpc.service, grpc.method, grpc.metadata.*, grpc.message, grpc.descriptor_ref, grpc.timeout]
    required_inputs: [grpc.service, grpc.method, grpc.message]
    output_refs: [response.message, response.status, response.metadata, response.duration_ms]
evidence:
  outputs: [grpc_request_response, request, response, status, metadata, timing, error]
  redact: [grpc.metadata.authorization]
failure_mapping:
  allowed_codes:
    - PROVIDER_UNAVAILABLE
    - PROVIDER_TIMEOUT
    - OPERATION_FAILED
    - ASSERTION_FAILED
    - EVIDENCE_INVALID
