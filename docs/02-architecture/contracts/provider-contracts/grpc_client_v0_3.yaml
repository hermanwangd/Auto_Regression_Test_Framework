---
contract_version: v0.3
provider_contract: grpc_client.v0.3
provider_type: grpc_client
provider_role: client
protocol: grpc
purpose: gRPC unary client provider contract for DSL v0.3.
runtime_modes:
- native
- mock
- stub
operation_defaults:
  input:
    value_type: any
    reference_kinds: &1
    - literal
    - artifact
    - step
    - generated
    - env
    sensitivity: public
  output:
    value_type: any
    sensitivity: public
    bindable: false
    evidence_included: true
  phases:
  - setup
  - execute
  - verify
  - cleanup
binding_keys:
  target:
    required: true
    source: env_profile
    value_type: string
    reference_kinds:
    - literal
    - generated
    - env
    sensitivity: public
  descriptor_ref:
    required: false
    source: env_profile
    value_type: string
    reference_kinds:
    - literal
    - generated
    - env
    sensitivity: public
operations:
  unary_call:
    inputs:
      grpc.service:
        required: true
        value_type: any
        reference_kinds: *1
        sensitivity: public
      grpc.method:
        required: true
        value_type: any
        reference_kinds: *1
        sensitivity: public
      grpc.metadata.*:
        required: false
        value_type: any
        reference_kinds: *1
        sensitivity: public
      grpc.message:
        required: true
        value_type: any
        reference_kinds: *1
        sensitivity: public
      grpc.descriptor_ref:
        required: false
        value_type: any
        reference_kinds: *1
        sensitivity: public
      grpc.timeout:
        required: false
        value_type: any
        reference_kinds: *1
        sensitivity: public
    outputs:
      response.message:
        value_type: any
        sensitivity: public
        bindable: false
        evidence_included: true
      response.status:
        value_type: any
        sensitivity: public
        bindable: false
        evidence_included: true
      response.metadata:
        value_type: any
        sensitivity: public
        bindable: false
        evidence_included: true
      response.duration_ms:
        value_type: any
        sensitivity: public
        bindable: false
        evidence_included: true
    allowed_inputs:
    - grpc.service
    - grpc.method
    - grpc.metadata.*
    - grpc.message
    - grpc.descriptor_ref
    - grpc.timeout
    required_inputs:
    - grpc.service
    - grpc.method
    - grpc.message
    output_refs:
    - response.message
    - response.status
    - response.metadata
    - response.duration_ms
evidence:
  outputs:
  - grpc_request_response
  - request
  - response
  - status
  - metadata
  - timing
  - error
  redact:
  - grpc.metadata.authorization
failure_mapping:
  allowed_codes:
  - PROVIDER_UNAVAILABLE
  - PROVIDER_TIMEOUT
  - OPERATION_FAILED
  - ASSERTION_FAILED
  - EVIDENCE_INVALID
