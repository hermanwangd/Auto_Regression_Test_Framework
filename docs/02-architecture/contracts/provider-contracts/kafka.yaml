provider_contract_version: v0.2
provider_type: kafka
runtime_modes: [native, mock, ephemeral]
executable_runtime_modes: [mock, native]
contract_only_runtime_modes: [ephemeral]
binding_keys:
  bootstrap_servers:
    required: true
    value_type: string
    allowed_value_kinds: [value, secret_ref, generated_ref]
  topic:
    required: true
    value_type: string
    allowed_value_kinds: [value]
  consumer_group:
    required: true
    value_type: string
    allowed_value_kinds: [value]
  timeout:
    required: false
    value_type: duration
    allowed_value_kinds: [value]
  poll_interval:
    required: false
    value_type: duration
    allowed_value_kinds: [value]
defaults:
  timeout: PT10S
  poll_interval: PT0.5S
  consume_from: test_start_time
valid_provider_instance_shape:
  required_fields: [provider_id, provider_type, runtime_modes]
  allowed_fields: [provider_instance_version, provider_id, provider_type, runtime_modes, defaults, operations, evidence, failure_mapping, labels]
operations:
  kafka_publish:
    allowed_inputs: [key, payload_ref, payload, timeout]
    required_inputs: [payload_ref]
    output_refs: [topic, partition, offset, key, published_at, event_evidence_ref]
  kafka_observe:
    allowed_inputs: [key, consume_from, timeout, poll_interval]
    required_inputs: []
    output_refs: [topic, observed_count, last_observed_offset, matched, duration_ms, event_evidence_ref]
  kafka_payload_match:
    allowed_inputs: [expected_ref, key, consume_from, timeout, poll_interval]
    required_inputs: [expected_ref]
    output_refs: [topic, observed_count, matched, matched_fields, duration_ms, event_evidence_ref, assertion_evidence_ref]
evidence:
  outputs: [event_evidence, assertion_evidence]
  event_evidence: [provider_type, provider_id, topic, partition, offset, key, masked_headers, payload_ref, masked_payload_sample, observation_start, observation_end, attempts, timeout_status, status, failure_code]
  redact: [bootstrap_servers, password, secret, token, authorization]
safety:
  shared_broker_rules:
    - use_test_owned_consumer_group
    - default_consume_from_test_start_time
    - do_not_commit_shared_offsets
    - broker_admin_purge_not_supported
failure_mapping:
  allowed_codes:
    - TOPIC_MISSING
    - PAYLOAD_REF_MISSING
    - KAFKA_CONNECTION_FAILED
    - KAFKA_PUBLISH_FAILED
    - KAFKA_OBSERVE_FAILED
    - EVENT_NOT_FOUND
    - PAYLOAD_MISMATCH
    - KAFKA_TIMEOUT
    - INVALID_DURATION
    - INVALID_INSTANT
    - REF_OUTSIDE_SUITE_ROOT
