provider_contract_version: v0.2
provider_type: wiremock_http_mock
runtime_modes: [mock]
binding_keys:
  mappings_ref:
    required: false
    value_type: string
    allowed_value_kinds: [value, ref]
  port_strategy:
    required: false
    value_type: enum
    allowed_values: [dynamic, fixed]
    allowed_value_kinds: [value]
  fixed_port:
    required: false
    value_type: integer
    allowed_value_kinds: [value]
bindable_outputs:
  base_url:
    value_type: uri
    produced_by_operations: [start_mock, connect_mock, load_stubs]
    ref_format: generated://{provider_id}.base_url
defaults:
  timeout_seconds: 60
  retry: 0
valid_provider_instance_shape:
  required_fields: [provider_id, provider_type, runtime_modes]
  allowed_fields: [provider_instance_version, provider_id, provider_type, runtime_modes, defaults, readiness, operations, evidence, failure_mapping, safety, labels]
operations:
  start_mock:
    allowed_inputs: [mock.port, mock.mappings_ref, mock.files_ref]
    required_inputs: []
    output_refs: [base_url, server_log]
  connect_mock:
    allowed_inputs: [mock.base_url]
    required_inputs: []
    output_refs: [base_url]
  load_stubs:
    allowed_inputs: [mock.mappings_ref, mock.reset_before_load]
    required_inputs: [mock.mappings_ref]
    output_refs: [base_url, loaded_stub_count, injected_stub, server_log]
  send_http_request:
    allowed_inputs: [http.method, http.path, http.request_body, http.headers.*, mock.request_filter]
    required_inputs: [http.request_body, mock.request_filter]
    output_refs: [base_url, http_status, response_body, matched_count, request_journal, server_log]
  verify_requests:
    allowed_inputs: [mock.request_filter, mock.expected_count, mock.body_pattern]
    required_inputs: [mock.request_filter]
    output_refs: [request_journal, matched_count]
  reset_mock:
    allowed_inputs: []
    required_inputs: []
    output_refs: [cleanup_log, server_log]
evidence:
  outputs: [base_url, request_journal, server_log, injected_stub, assertion_result, timing, cleanup_log, failure_detail, error]
  redact: []
failure_mapping:
  allowed_codes: [PROVIDER_UNAVAILABLE, PROVIDER_TIMEOUT, PROVIDER_STUB_MISSING, OPERATION_FAILED, ASSERTION_FAILED, EVIDENCE_INVALID, SECRET_RESOLUTION_ERROR]
