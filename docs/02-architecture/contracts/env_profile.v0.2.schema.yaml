contract_version: v0.2
artifact: env_profile
status: framework_owned_next_interface
public_name: Env_Profile
purpose: >
  Defines how one named environment executes framework tests. Env_Profile combines
  execution policy, dependency policy, provider runtime modes, and provider binding
  key values for a selected environment without putting environment values in DSL.
version_compatibility:
  supported_versions: [v0.2]
  unsupported_version_behavior: block_before_execution
compatibility:
  replaces_public_artifacts:
    - execution_profile.v0.2.schema.yaml
    - environment_binding.v0.2.schema.yaml
  old_artifacts_remain_runtime_compatibility_inputs_until_migration: true
required_fields:
  - env_profile_id
  - execution_mode
  - providers
  - dependency_policy
  - dependency_substitution_policy
  - dependency_provisioning_policy
  - data_policy
allowed_execution_modes: [local, ci, sit, preprod]
provider_binding_shape:
  map_key: provider_id
  required_fields:
    - runtime_mode
    - binding_keys
  forbidden_fields:
    - provider_instance_ref
    - provider_type
    - binding_values
  runtime_mode_values: [native, mock, stub, ephemeral]
binding_key_rules:
  env_profile_path: providers.<provider_id>.binding_keys.<binding_key>
  contract_path: Provider Contract.binding_keys.<binding_key>
  keys_must_match_provider_contract_binding_keys: true
  dsl_must_not_define_provider_binding_keys: true
  provider_instance_must_not_define_binding_key_schema: true
  value_kinds:
    value: literal value allowed only when Provider Contract allows value
    ref: checked-in non-secret reference allowed only when Provider Contract allows ref
    secret_ref: secret reference allowed only when Provider Contract allows secret_ref
    generated_ref: runtime generated reference allowed only when Provider Contract allows generated_ref
    local_ref: approved local reference allowed only when Provider Contract allows local_ref
  generated_ref_format: generated://<provider_or_dependency_id>.<output>
  generated_refs_must_target_provider_contract_bindable_outputs_or_declared_dependency_outputs: true
dependency_substitution_policy:
  local_allowed_runtime_modes: [mock, stub, ephemeral, native]
  ci_allowed_runtime_modes: [mock, stub, ephemeral, native]
  sit_allowed_runtime_modes: [native]
  preprod_allowed_runtime_modes: [native]
  mock_evidence_release_claim: prohibited
dependency_provisioning_policy:
  allowed_provisioners:
    - wiremock_embedded
    - testcontainers
    - docker_compose
    - local_process
    - in_memory
    - none
  generated_outputs:
    description: Optional validation allow-list for externally provisioned dependency outputs.
    examples:
      - generated://oracle-ephemeral.connection
      - generated://dummy-rest-app.base_url
  generated_values_may_be_referenced_by_binding_keys: true
secret_policy:
  allow_secret_refs: true
  block_raw_secrets: true
validation_output_fields:
  - ap
  - file_path
  - field_path
  - env_profile_id
  - execution_mode
  - provider_id
  - provider_type
  - runtime_mode
  - binding_key
  - severity
  - reason
  - owner_action
unsupported_behavior:
  missing_env_profile: block_before_provider_dispatch
  missing_provider_binding: block_before_provider_dispatch
  missing_required_binding_key: block_before_provider_dispatch
  unknown_binding_key: block_before_provider_dispatch
  invalid_binding_key_value_kind: block_before_provider_dispatch
  invalid_binding_key_value_type: block_before_provider_dispatch
  invalid_generated_ref: block_before_provider_dispatch
  unknown_bindable_output: block_before_provider_dispatch
  unsupported_runtime_mode: block_before_provider_dispatch
  prohibited_mock_substitution: block_before_provider_dispatch
  raw_secret: block_before_execution
failure_classification: environment_error
